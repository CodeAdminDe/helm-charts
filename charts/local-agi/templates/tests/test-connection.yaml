apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "local-agi.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "local-agi.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  activeDeadlineSeconds: 60
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37
      imagePullPolicy: IfNotPresent
      command: ["wget"]
      args: ["--spider", "--timeout=10", "--tries=3", 'http://{{ include "local-agi.fullname" . }}:{{ .Values.service.port }}/readyz']
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
  restartPolicy: Never
