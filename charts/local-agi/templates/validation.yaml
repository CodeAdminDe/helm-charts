{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/route resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and (not .Values.persistence.enabled) (not (empty .Values.persistence.existingClaim)) -}}
{{- fail "persistence.existingClaim requires persistence.enabled=true." -}}
{{- end -}}

{{- if ne .Values.localAgi.stateDir .Values.persistence.mountPath -}}
{{- fail "localAgi.stateDir must match persistence.mountPath for this chart implementation." -}}
{{- end -}}

{{- if empty .Values.localAgi.model -}}
{{- fail "localAgi.model must be set." -}}
{{- end -}}

{{- if empty .Values.localAgi.llmApiUrl -}}
{{- fail "localAgi.llmApiUrl must be set." -}}
{{- end -}}

{{- if and .Values.localAgi.llmApiKeySecret.name (empty .Values.localAgi.llmApiKeySecret.key) -}}
{{- fail "localAgi.llmApiKeySecret.key must be set when localAgi.llmApiKeySecret.name is provided." -}}
{{- end -}}

{{- if and .Values.localAgi.apiKeysSecret.name (empty .Values.localAgi.apiKeysSecret.key) -}}
{{- fail "localAgi.apiKeysSecret.key must be set when localAgi.apiKeysSecret.name is provided." -}}
{{- end -}}

{{- if and .Values.localAgi.localRagApiKeySecret.name (empty .Values.localAgi.localRagApiKeySecret.key) -}}
{{- fail "localAgi.localRagApiKeySecret.key must be set when localAgi.localRagApiKeySecret.name is provided." -}}
{{- end -}}

{{- if not (has (default "none" .Values.database.mode) (list "none" "postgres")) -}}
{{- fail "database.mode must be one of: none, postgres." -}}
{{- end -}}

{{- if and (ne .Values.database.mode "postgres") .Values.database.useCnpgCluster.enabled -}}
{{- fail "database.useCnpgCluster.enabled=true requires database.mode=postgres." -}}
{{- end -}}

{{- if eq .Values.database.mode "postgres" -}}
  {{- if empty .Values.database.postgres.ssl -}}
    {{- fail "database.postgres.ssl must be set when database.mode=postgres." -}}
  {{- end -}}
  {{- if .Values.database.useCnpgCluster.enabled -}}
    {{- if empty .Values.database.useCnpgCluster.clusterName -}}
      {{- fail "database.useCnpgCluster.clusterName must be set when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.database -}}
      {{- fail "database.useCnpgCluster.secretKeys.database is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.username -}}
      {{- fail "database.useCnpgCluster.secretKeys.username is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.password -}}
      {{- fail "database.useCnpgCluster.secretKeys.password is required when CNPG integration is enabled." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.database.postgres.host -}}
      {{- fail "database.postgres.host must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.database -}}
      {{- fail "database.postgres.database must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.user -}}
      {{- fail "database.postgres.user must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.name -}}
      {{- fail "database.postgres.passwordSecret.name must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.key -}}
      {{- fail "database.postgres.passwordSecret.key must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
