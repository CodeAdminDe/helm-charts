{{- define "garage.CiliumNetworkPolicies-NamespaceSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ toJson .Values | sha256sum }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-NamespaceSet" (list . "garage.CiliumNetworkPolicies-NamespaceSet") }}
---
{{- end -}}

{{- define "garage.CiliumNetworkPolicies-AppSet" -}}
{{- $ingressPorts := list (dict "port" (printf "%v" .Values.service.s3Api.targetPort) "protocol" (.Values.service.s3Api.targetProtocol | default "TCP")) -}}
{{- if and .Values.cnps.appTraffic.ingress.includeS3WebPort .Values.garage.s3Web.enabled .Values.service.s3Web.enabled -}}
{{- $ingressPorts = append $ingressPorts (dict "port" (printf "%v" .Values.service.s3Web.targetPort) "protocol" (.Values.service.s3Web.targetProtocol | default "TCP")) -}}
{{- end -}}
{{- if and .Values.cnps.appTraffic.ingress.includeAdminPort .Values.garage.admin.enabled .Values.service.admin.enabled -}}
{{- $ingressPorts = append $ingressPorts (dict "port" (printf "%v" .Values.service.admin.targetPort) "protocol" (.Values.service.admin.targetProtocol | default "TCP")) -}}
{{- end -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ toJson .Values | sha256sum }}
  labels:
    {{- include "garage.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "garage.selectorLabels" . | nindent 6 }}
  {{- if .Values.cnps.appTraffic.ingress.allow }}
  ingress:
    - fromEndpoints:
        - matchLabels:
          {{- if .Values.cnps.appTraffic.ingress.matchLabels }}
          {{- range $k, $v := .Values.cnps.appTraffic.ingress.matchLabels }}
            {{ $k }}: {{ $v | quote }}
          {{- end }}
          {{- else }}
            app.kubernetes.io/name: ingress-nginx
            io.kubernetes.pod.namespace: ingress-nginx
          {{- end }}
      toPorts:
        - ports:
          {{- range $ingressPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
  {{- end }}
  {{- if .Values.cnps.appTraffic.egress.allow }}
  egress:
    {{- if .Values.cnps.appTraffic.egress.matchLabels }}
    - toEndpoints:
        - matchLabels:
          {{- range $k, $v := .Values.cnps.appTraffic.egress.matchLabels }}
            {{ $k }}: {{ $v | quote }}
          {{- end }}
      toPorts:
        - ports:
          {{- if .Values.cnps.appTraffic.egress.toPorts }}
          {{- range .Values.cnps.appTraffic.egress.toPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
          {{- else }}
            - port: "443"
              protocol: TCP
          {{- end }}
    {{- end }}
    - toEntities:
      {{- if .Values.cnps.appTraffic.egress.toEntities }}
        {{- toYaml .Values.cnps.appTraffic.egress.toEntities | nindent 8 }}
      {{- else }}
        - world
      {{- end }}
      toPorts:
        - ports:
          {{- if .Values.cnps.appTraffic.egress.toPorts }}
          {{- range .Values.cnps.appTraffic.egress.toPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
          {{- else }}
            - port: "443"
              protocol: TCP
          {{- end }}
    {{- if and .Values.cnps.appTraffic.egress.allowKubernetesApi .Values.garage.kubernetesDiscovery.enabled }}
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    {{- end }}
  {{- end }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-AppSet" (list . "garage.CiliumNetworkPolicies-AppSet") }}
{{- end -}}
