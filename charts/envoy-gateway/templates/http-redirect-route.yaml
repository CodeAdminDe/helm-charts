{{- if and .Values.bootstrap.gateway.enabled (eq (include "envoy-gateway.bootstrap.gatewayMode" .) "managed") .Values.bootstrap.gateway.tls.enabled .Values.bootstrap.gateway.httpListener.enabled .Values.bootstrap.gateway.tls.redirectHttpToHttps.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "envoy-gateway.bootstrap.httpRedirectRouteName" . }}
  namespace: {{ include "envoy-gateway.bootstrap.gatewayNamespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    {{- with .Values.bootstrap.gateway.tls.redirectHttpToHttps.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.bootstrap.gateway.tls.redirectHttpToHttps.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ include "envoy-gateway.bootstrap.gatewayName" . | quote }}
      sectionName: {{ .Values.bootstrap.gateway.httpListener.name | quote }}
  hostnames:
    {{- range .Values.bootstrap.gateway.tls.listeners }}
    - {{ .hostname | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: {{ .Values.bootstrap.gateway.tls.redirectHttpToHttps.statusCode }}
{{- end }}
