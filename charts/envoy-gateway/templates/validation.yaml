{{- $envoyGateway := (index .Values "envoy-gateway") | default dict -}}
{{- $gatewayMode := include "envoy-gateway.bootstrap.gatewayMode" . -}}
{{- $validGatewayModes := list "raw" "managed" -}}
{{- $validRedirectCodes := list 301 302 303 307 308 -}}
{{- $cnps := .Values.cnps | default dict -}}

{{- define "envoy-gateway.validation.requireSlice" -}}
{{- $value := index . 0 -}}
{{- $path := index . 1 -}}
{{- if not (kindIs "slice" $value) -}}
{{- fail (printf "%s must be a list." $path) -}}
{{- end -}}
{{- end -}}

{{- if hasKey .Values "envoyGateway" -}}
{{- fail "The top-level values key 'envoyGateway' has been renamed to 'envoy-gateway'. Update your values files and overrides accordingly." -}}
{{- end -}}

{{- if and (or .Values.bootstrap.gatewayClass.enabled .Values.bootstrap.envoyProxy.enabled .Values.bootstrap.gateway.enabled) (not (index $envoyGateway "enabled")) -}}
{{- fail "envoy-gateway.enabled must be true when bootstrap resources are enabled." -}}
{{- end -}}

{{- if not (has $gatewayMode $validGatewayModes) -}}
{{- fail "bootstrap.gateway.mode must be either 'raw' or 'managed'." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.tls.enabled (ne $gatewayMode "managed") -}}
{{- fail "bootstrap.gateway.tls.enabled=true requires bootstrap.gateway.mode=managed." -}}
{{- end -}}

{{- if and .Values.bootstrap.gatewayClass.enabled (empty .Values.bootstrap.gatewayClass.name) -}}
{{- fail "bootstrap.gatewayClass.name must be set when bootstrap.gatewayClass.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gatewayClass.enabled .Values.bootstrap.gatewayClass.parametersRef.enabled (empty .Values.bootstrap.gatewayClass.parametersRef.name) -}}
{{- fail "bootstrap.gatewayClass.parametersRef.name must be set when bootstrap.gatewayClass.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gatewayClass.enabled .Values.bootstrap.gatewayClass.parametersRef.enabled (empty .Values.bootstrap.gatewayClass.parametersRef.group) -}}
{{- fail "bootstrap.gatewayClass.parametersRef.group must be set when bootstrap.gatewayClass.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gatewayClass.enabled .Values.bootstrap.gatewayClass.parametersRef.enabled (empty .Values.bootstrap.gatewayClass.parametersRef.kind) -}}
{{- fail "bootstrap.gatewayClass.parametersRef.kind must be set when bootstrap.gatewayClass.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.envoyProxy.enabled (empty .Values.bootstrap.envoyProxy.name) -}}
{{- fail "bootstrap.envoyProxy.name must be set when bootstrap.envoyProxy.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.envoyProxy.enabled (empty .Values.bootstrap.envoyProxy.spec) -}}
{{- fail "bootstrap.envoyProxy.spec must be set when bootstrap.envoyProxy.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled (empty .Values.bootstrap.gateway.name) -}}
{{- fail "bootstrap.gateway.name must be set when bootstrap.gateway.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled (empty .Values.bootstrap.gateway.gatewayClassName) -}}
{{- fail "bootstrap.gateway.gatewayClassName must be set when bootstrap.gateway.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled .Values.bootstrap.gateway.infrastructure.parametersRef.enabled (empty .Values.bootstrap.gateway.infrastructure.parametersRef.name) -}}
{{- fail "bootstrap.gateway.infrastructure.parametersRef.name must be set when bootstrap.gateway.infrastructure.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled .Values.bootstrap.gateway.infrastructure.parametersRef.enabled (empty .Values.bootstrap.gateway.infrastructure.parametersRef.group) -}}
{{- fail "bootstrap.gateway.infrastructure.parametersRef.group must be set when bootstrap.gateway.infrastructure.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled .Values.bootstrap.gateway.infrastructure.parametersRef.enabled (empty .Values.bootstrap.gateway.infrastructure.parametersRef.kind) -}}
{{- fail "bootstrap.gateway.infrastructure.parametersRef.kind must be set when bootstrap.gateway.infrastructure.parametersRef.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled .Values.bootstrap.gatewayClass.enabled (ne .Values.bootstrap.gateway.gatewayClassName .Values.bootstrap.gatewayClass.name) -}}
{{- fail "bootstrap.gateway.gatewayClassName must match bootstrap.gatewayClass.name when both resources are enabled." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled (eq $gatewayMode "raw") (empty .Values.bootstrap.gateway.listeners) -}}
{{- fail "bootstrap.gateway.listeners must contain at least one listener when bootstrap.gateway.mode=raw and bootstrap.gateway.enabled=true." -}}
{{- end -}}

{{- if and .Values.bootstrap.gateway.enabled (eq $gatewayMode "managed") -}}
  {{- if not .Values.bootstrap.gateway.tls.enabled -}}
    {{- fail "bootstrap.gateway.mode=managed requires bootstrap.gateway.tls.enabled=true." -}}
  {{- end -}}
  {{- if not .Values.bootstrap.gateway.tls.listeners -}}
    {{- fail "bootstrap.gateway.tls.listeners must contain at least one HTTPS listener when bootstrap.gateway.mode=managed." -}}
  {{- end -}}
  {{- if and .Values.bootstrap.gateway.tls.redirectHttpToHttps.enabled (not .Values.bootstrap.gateway.httpListener.enabled) -}}
    {{- fail "bootstrap.gateway.tls.redirectHttpToHttps.enabled=true requires bootstrap.gateway.httpListener.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.bootstrap.gateway.tls.redirectHttpToHttps.enabled (ne .Values.bootstrap.gateway.httpListener.allowedRoutes.namespaces.from "Same") -}}
    {{- fail "bootstrap.gateway.httpListener.allowedRoutes.namespaces.from must be 'Same' when bootstrap.gateway.tls.redirectHttpToHttps.enabled=true to reserve HTTP for the central redirect route." -}}
  {{- end -}}
  {{- if and .Values.bootstrap.gateway.httpListener.enabled (empty .Values.bootstrap.gateway.httpListener.name) -}}
    {{- fail "bootstrap.gateway.httpListener.name must be set when bootstrap.gateway.httpListener.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.bootstrap.gateway.httpListener.enabled (empty .Values.bootstrap.gateway.httpListener.port) -}}
    {{- fail "bootstrap.gateway.httpListener.port must be set when bootstrap.gateway.httpListener.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.bootstrap.gateway.tls.redirectHttpToHttps.enabled (not (has (int .Values.bootstrap.gateway.tls.redirectHttpToHttps.statusCode) $validRedirectCodes)) -}}
    {{- fail "bootstrap.gateway.tls.redirectHttpToHttps.statusCode must be one of 301, 302, 303, 307, or 308." -}}
  {{- end -}}

  {{- $listenerNames := dict -}}
  {{- $listenerHostnames := dict -}}
  {{- range $idx, $listener := .Values.bootstrap.gateway.tls.listeners -}}
    {{- if empty $listener.name -}}
      {{- fail (printf "bootstrap.gateway.tls.listeners[%d].name must be set." $idx) -}}
    {{- end -}}
    {{- if hasKey $listenerNames $listener.name -}}
      {{- fail (printf "bootstrap.gateway.tls.listeners[%d].name '%s' is duplicated." $idx $listener.name) -}}
    {{- end -}}
    {{- $_ := set $listenerNames $listener.name true -}}
    {{- if empty $listener.hostname -}}
      {{- fail (printf "bootstrap.gateway.tls.listeners[%d].hostname must be set." $idx) -}}
    {{- end -}}
    {{- if hasKey $listenerHostnames $listener.hostname -}}
      {{- fail (printf "bootstrap.gateway.tls.listeners[%d].hostname '%s' is duplicated." $idx $listener.hostname) -}}
    {{- end -}}
    {{- $_ := set $listenerHostnames $listener.hostname true -}}
    {{- if empty $listener.certificateRefName -}}
      {{- fail (printf "bootstrap.gateway.tls.listeners[%d].certificateRefName must be set." $idx) -}}
    {{- end -}}
  {{- end -}}

  {{- $certificateSecretNames := dict -}}
  {{- range $idx, $certificate := .Values.bootstrap.gateway.tls.certificates -}}
    {{- if empty $certificate.secretName -}}
      {{- fail (printf "bootstrap.gateway.tls.certificates[%d].secretName must be set." $idx) -}}
    {{- end -}}
    {{- if $certificate.name -}}
      {{- fail (printf "bootstrap.gateway.tls.certificates[%d].name is not supported. Certificate metadata.name is derived from secretName." $idx) -}}
    {{- end -}}
    {{- if hasKey $certificateSecretNames $certificate.secretName -}}
      {{- fail (printf "bootstrap.gateway.tls.certificates[%d].secretName '%s' is duplicated." $idx $certificate.secretName) -}}
    {{- end -}}
    {{- $_ := set $certificateSecretNames $certificate.secretName true -}}
    {{- if not $certificate.dnsNames -}}
      {{- fail (printf "bootstrap.gateway.tls.certificates[%d].dnsNames must contain at least one DNS name." $idx) -}}
    {{- end -}}
    {{- if empty $certificate.issuerRef.name -}}
      {{- fail (printf "bootstrap.gateway.tls.certificates[%d].issuerRef.name must be set." $idx) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if $cnps.enabled -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.proxy.fromEntities "cnps.controlPlane.ingress.proxy.fromEntities") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.proxy.fromEndpoints "cnps.controlPlane.ingress.proxy.fromEndpoints") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.proxy.ports "cnps.controlPlane.ingress.proxy.ports") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.webhook.fromEntities "cnps.controlPlane.ingress.webhook.fromEntities") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.webhook.fromEndpoints "cnps.controlPlane.ingress.webhook.fromEndpoints") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.metrics.fromEntities "cnps.controlPlane.ingress.metrics.fromEntities") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.metrics.fromEndpoints "cnps.controlPlane.ingress.metrics.fromEndpoints") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.ingress.extraRules "cnps.controlPlane.ingress.extraRules") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.controlPlane.egress.extraRules "cnps.controlPlane.egress.extraRules") -}}
  {{- include "envoy-gateway.validation.requireSlice" (list .Values.cnps.certgen.egress.extraRules "cnps.certgen.egress.extraRules") -}}

  {{- if and .Values.cnps.controlPlane.ingress.proxy.enabled (empty .Values.cnps.controlPlane.ingress.proxy.ports) -}}
    {{- fail "cnps.controlPlane.ingress.proxy.ports must contain at least one port when cnps.controlPlane.ingress.proxy.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.cnps.controlPlane.ingress.proxy.enabled (empty .Values.cnps.controlPlane.ingress.proxy.fromEntities) (empty .Values.cnps.controlPlane.ingress.proxy.fromEndpoints) -}}
    {{- fail "cnps.controlPlane.ingress.proxy requires at least one explicit source via fromEntities and/or fromEndpoints when enabled." -}}
  {{- end -}}
  {{- if and .Values.cnps.controlPlane.ingress.webhook.enabled (empty .Values.cnps.controlPlane.ingress.webhook.port) -}}
    {{- fail "cnps.controlPlane.ingress.webhook.port must be set when cnps.controlPlane.ingress.webhook.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.cnps.controlPlane.ingress.webhook.enabled (empty .Values.cnps.controlPlane.ingress.webhook.fromEntities) (empty .Values.cnps.controlPlane.ingress.webhook.fromEndpoints) -}}
    {{- fail "cnps.controlPlane.ingress.webhook requires at least one explicit source via fromEntities and/or fromEndpoints when enabled." -}}
  {{- end -}}
  {{- if and .Values.cnps.controlPlane.ingress.metrics.enabled (empty .Values.cnps.controlPlane.ingress.metrics.port) -}}
    {{- fail "cnps.controlPlane.ingress.metrics.port must be set when cnps.controlPlane.ingress.metrics.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.cnps.controlPlane.ingress.metrics.enabled (empty .Values.cnps.controlPlane.ingress.metrics.fromEntities) (empty .Values.cnps.controlPlane.ingress.metrics.fromEndpoints) -}}
    {{- fail "cnps.controlPlane.ingress.metrics requires at least one explicit source via fromEntities and/or fromEndpoints when enabled." -}}
  {{- end -}}
{{- end -}}
