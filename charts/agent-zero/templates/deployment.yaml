apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-zero.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-zero.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "agent-zero.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agent-zero.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agent-zero.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if and (eq (include "agent-zero.vpn.netbird.enabled" .) "true") .Values.vpn.netbird.hostAliases }}
      hostAliases:
        {{- toYaml .Values.vpn.netbird.hostAliases | nindent 8 }}
      {{- end }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "agent-zero.name" . }}
          image: {{ include "agent-zero.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.targetProtocol }}
            {{- with .Values.service.extraPorts }}
            {{- range . }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
            {{- end }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and (eq (include "agent-zero.vpn.netbird.enabled" .) "true") .Values.vpn.netbird.proxyEnv.enabled }}
            {{- $netbirdProxyUrl := include "agent-zero.vpn.netbird.socksProxyUrl" . }}
            {{- if and .Values.vpn.netbird.proxyEnv.injectAllProxy (not (hasKey .Values.env "ALL_PROXY")) }}
            - name: ALL_PROXY
              value: {{ $netbirdProxyUrl | quote }}
            {{- end }}
            {{- if and .Values.vpn.netbird.proxyEnv.injectHttpProxy (not (hasKey .Values.env "HTTP_PROXY")) }}
            - name: HTTP_PROXY
              value: {{ $netbirdProxyUrl | quote }}
            {{- end }}
            {{- if and .Values.vpn.netbird.proxyEnv.injectHttpsProxy (not (hasKey .Values.env "HTTPS_PROXY")) }}
            - name: HTTPS_PROXY
              value: {{ $netbirdProxyUrl | quote }}
            {{- end }}
            {{- if and .Values.vpn.netbird.proxyEnv.noProxy (not (hasKey .Values.env "NO_PROXY")) }}
            - name: NO_PROXY
              value: {{ .Values.vpn.netbird.proxyEnv.noProxy | quote }}
            {{- end }}
            {{- end }}
            {{- if kindIs "map" .Values.additionalEnvSecrets }}
            {{- range $envName, $secretConfig := .Values.additionalEnvSecrets }}
            {{- if kindIs "string" $secretConfig }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretConfig }}
                  key: {{ $envName | quote }}
            {{- else if kindIs "map" $secretConfig }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- if $secretName }}
            - name: {{ default $envName (index $secretConfig "name") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- else if kindIs "slice" .Values.additionalEnvSecrets }}
            {{- range $secretConfig := .Values.additionalEnvSecrets }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- $envName := (default "" (index $secretConfig "name")) }}
            {{- if and $secretName $envName }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.applyHealthChecks }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
            {{- end }}
            {{- if .Values.hostDockerSocket.enabled }}
            - name: docker-socket
              mountPath: {{ .Values.hostDockerSocket.mountPath }}
              readOnly: {{ .Values.hostDockerSocket.readOnly }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if eq (include "agent-zero.vpn.netbird.enabled" .) "true" }}
        - name: netbird
          image: {{ include "agent-zero.vpn.netbird.image" . }}
          imagePullPolicy: {{ .Values.vpn.netbird.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.vpn.netbird.securityContext | nindent 12 }}
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vpn.netbird.setupKeySecret.name }}
                  key: {{ .Values.vpn.netbird.setupKeySecret.key | quote }}
            - name: NB_MANAGEMENT_URL
              value: {{ .Values.vpn.netbird.managementUrl | quote }}
            - name: NB_ADMIN_URL
              value: {{ .Values.vpn.netbird.adminUrl | quote }}
            - name: NB_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NB_USE_NETSTACK_MODE
              value: "true"
            - name: NB_ENABLE_NETSTACK_LOCAL_FORWARDING
              value: "true"
            - name: NB_DISABLE_DNS
              value: "true"
            - name: NB_SOCKS5_LISTENER_PORT
              value: {{ .Values.vpn.netbird.socks5.port | quote }}
            - name: NB_STATE_DIR
              value: /var/lib/netbird
            - name: NB_CONFIG
              value: /var/lib/netbird/config.json
            - name: NB_DAEMON_ADDR
              value: unix:///var/lib/netbird/netbird.sock
            - name: NB_LOG_FILE
              value: console,/var/lib/netbird/client.log
            {{- if .Values.vpn.netbird.extraDnsLabels }}
            - name: NB_EXTRA_DNS_LABELS
              value: {{ .Values.vpn.netbird.extraDnsLabels | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.vpn.netbird.resources | nindent 12 }}
          volumeMounts:
            - name: netbird-state
              mountPath: /var/lib/netbird
            - name: netbird-tmp
              mountPath: /tmp
        {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-zero.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir:
            {{- with .Values.tmpVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- if .Values.hostDockerSocket.enabled }}
        - name: docker-socket
          hostPath:
            path: {{ .Values.hostDockerSocket.hostPath }}
            type: {{ .Values.hostDockerSocket.type }}
        {{- end }}
        {{- if eq (include "agent-zero.vpn.netbird.enabled" .) "true" }}
        - name: netbird-state
          {{- if .Values.vpn.netbird.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "agent-zero.vpn.netbird.stateClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: netbird-tmp
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
