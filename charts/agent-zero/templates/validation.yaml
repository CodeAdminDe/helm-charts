{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/route resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and .Values.hostDockerSocket.enabled .Values.securityContext.readOnlyRootFilesystem -}}
{{- fail "hostDockerSocket.enabled=true is incompatible with securityContext.readOnlyRootFilesystem=true in most environments." -}}
{{- end -}}

{{- if and (not .Values.persistence.enabled) (not (empty .Values.persistence.existingClaim)) -}}
{{- fail "persistence.existingClaim requires persistence.enabled=true." -}}
{{- end -}}

{{- if eq .Values.persistence.mountPath "/a0" -}}
{{- fail "persistence.mountPath=/a0 is not supported for upstream compatibility; use /a0/usr to avoid overriding bundled application files." -}}
{{- end -}}

{{- if not (has (default "none" .Values.vpn.provider) (list "none" "netbird" "tailscale")) -}}
{{- fail "vpn.provider must be one of: none, netbird, tailscale." -}}
{{- end -}}

{{- if eq (default "none" .Values.vpn.provider) "netbird" -}}
  {{- if empty .Values.vpn.netbird.setupKeySecret.name -}}
    {{- fail "vpn.netbird.setupKeySecret.name must be set when vpn.provider=netbird." -}}
  {{- end -}}
  {{- if empty .Values.vpn.netbird.setupKeySecret.key -}}
    {{- fail "vpn.netbird.setupKeySecret.key must be set when vpn.provider=netbird." -}}
  {{- end -}}
  {{- if or (lt (int .Values.vpn.netbird.socks5.port) 1) (gt (int .Values.vpn.netbird.socks5.port) 65535) -}}
    {{- fail "vpn.netbird.socks5.port must be in range 1..65535 when vpn.provider=netbird." -}}
  {{- end -}}
{{- end -}}

{{- if and (eq (default "none" .Values.vpn.provider) "netbird") (not .Values.vpn.netbird.persistence.enabled) (not (empty .Values.vpn.netbird.persistence.existingClaim)) -}}
{{- fail "vpn.netbird.persistence.existingClaim requires vpn.netbird.persistence.enabled=true." -}}
{{- end -}}

{{- if eq (default "none" .Values.vpn.provider) "tailscale" -}}
  {{- if empty .Values.vpn.tailscale.authKeySecret.name -}}
    {{- fail "vpn.tailscale.authKeySecret.name must be set when vpn.provider=tailscale." -}}
  {{- end -}}
  {{- if empty .Values.vpn.tailscale.authKeySecret.key -}}
    {{- fail "vpn.tailscale.authKeySecret.key must be set when vpn.provider=tailscale." -}}
  {{- end -}}
  {{- if not .Values.vpn.tailscale.userspace -}}
    {{- fail "vpn.tailscale.userspace must be true for this sidecar implementation (restricted-env baseline)." -}}
  {{- end -}}
  {{- if and .Values.vpn.tailscale.socks5.enabled (or (lt (int .Values.vpn.tailscale.socks5.port) 1) (gt (int .Values.vpn.tailscale.socks5.port) 65535)) -}}
    {{- fail "vpn.tailscale.socks5.port must be in range 1..65535 when vpn.tailscale.socks5.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.vpn.tailscale.httpProxy.enabled (or (lt (int .Values.vpn.tailscale.httpProxy.port) 1) (gt (int .Values.vpn.tailscale.httpProxy.port) 65535)) -}}
    {{- fail "vpn.tailscale.httpProxy.port must be in range 1..65535 when vpn.tailscale.httpProxy.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.vpn.tailscale.proxyEnv.enabled .Values.vpn.tailscale.proxyEnv.injectAllProxy (not .Values.vpn.tailscale.socks5.enabled) (empty .Values.vpn.tailscale.proxyEnv.socksProxyUrl) -}}
    {{- fail "vpn.tailscale.proxyEnv.injectAllProxy=true requires vpn.tailscale.socks5.enabled=true or vpn.tailscale.proxyEnv.socksProxyUrl to be set." -}}
  {{- end -}}
  {{- if and .Values.vpn.tailscale.proxyEnv.enabled (or .Values.vpn.tailscale.proxyEnv.injectHttpProxy .Values.vpn.tailscale.proxyEnv.injectHttpsProxy) (not .Values.vpn.tailscale.httpProxy.enabled) (empty .Values.vpn.tailscale.proxyEnv.httpProxyUrl) -}}
    {{- fail "vpn.tailscale.proxyEnv.injectHttpProxy/injectHttpsProxy requires vpn.tailscale.httpProxy.enabled=true or vpn.tailscale.proxyEnv.httpProxyUrl to be set." -}}
  {{- end -}}
{{- end -}}

{{- if and (eq (default "none" .Values.vpn.provider) "tailscale") (not .Values.vpn.tailscale.persistence.enabled) (not (empty .Values.vpn.tailscale.persistence.existingClaim)) -}}
{{- fail "vpn.tailscale.persistence.existingClaim requires vpn.tailscale.persistence.enabled=true." -}}
{{- end -}}

{{- if and (eq (default "none" .Values.vpn.provider) "tailscale") .Values.vpn.tailscale.persistence.enabled (not (empty .Values.vpn.tailscale.kubeSecretStateName)) -}}
{{- fail "vpn.tailscale.persistence.enabled cannot be combined with vpn.tailscale.kubeSecretStateName; choose filesystem state PVC/emptyDir or Kubernetes Secret state backend." -}}
{{- end -}}

{{- range $idx, $port := .Values.service.extraPorts }}
  {{- if empty $port.name -}}
    {{- fail (printf "service.extraPorts[%d].name must be set." $idx) -}}
  {{- end -}}
  {{- if not $port.port -}}
    {{- fail (printf "service.extraPorts[%d].port must be set." $idx) -}}
  {{- end -}}
  {{- if not $port.targetPort -}}
    {{- fail (printf "service.extraPorts[%d].targetPort must be set." $idx) -}}
  {{- end -}}
{{- end -}}
