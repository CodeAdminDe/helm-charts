{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/route resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and .Values.hostDockerSocket.enabled .Values.securityContext.readOnlyRootFilesystem -}}
{{- fail "hostDockerSocket.enabled=true is incompatible with securityContext.readOnlyRootFilesystem=true in most environments." -}}
{{- end -}}

{{- if and (not .Values.persistence.enabled) (not (empty .Values.persistence.existingClaim)) -}}
{{- fail "persistence.existingClaim requires persistence.enabled=true." -}}
{{- end -}}
