{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-zero.rbacRoleName" . }}
  namespace: {{ include "agent-zero.rbacNamespace" . }}
  labels:
    {{- include "agent-zero.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
{{- end }}
