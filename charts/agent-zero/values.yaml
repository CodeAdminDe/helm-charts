# -- Number of application pod replicas.
replicaCount: 1

# -- Override release-based naming.
nameOverride: ""
fullnameOverride: ""

# -- Container image configuration.
image:
  # -- Image repository.
  repository: agent0ai/agent-zero
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag override (defaults to .Chart.AppVersion when empty).
  tag: ""

# -- Image pull secrets (for private registries).
imagePullSecrets: []

# -- Service account configuration.
serviceAccount:
  # -- Create a service account.
  create: true
  # -- ServiceAccount annotations.
  annotations: {}
  # -- ServiceAccount name override.
  name: ""
  # -- Automount SA token.
  automountServiceAccountToken: false

# -- Optional namespace-scoped RBAC configuration.
rbac:
  # -- Create Role + RoleBinding.
  create: false
  # -- Namespace override for RBAC resources.
  namespace: ""
  # -- Explicit RBAC rules required when rbac.create=true.
  rules: []

# -- Kubernetes Service configuration.
service:
  # -- Service type. This chart enforces ClusterIP.
  type: ClusterIP
  # -- Service annotations.
  annotations: {}
  # -- Service labels.
  labels: {}
  # -- Service port.
  port: 80
  # -- Container target port.
  targetPort: 80
  # -- Service protocol.
  targetProtocol: TCP
  # -- Additional service ports for optional upstream features (for example SSH or tool/tunnel ports).
  extraPorts: []
  # - name: ssh
  #   port: 22
  #   targetPort: 22
  #   protocol: TCP
  # - name: tool-9000
  #   port: 9000
  #   targetPort: 9000
  #   protocol: TCP

# -- Ingress configuration (ingress-nginx style).
ingress:
  # -- Enable ingress resource creation.
  enabled: false
  # -- Ingress class name.
  className: ""
  # -- Additional ingress annotations.
  annotations: {}
  # -- Secure defaults for websocket and long-lived sessions.
  secureDefaults:
    # -- Enable secure default ingress annotations.
    enabled: true
    # -- Proxy read timeout in seconds.
    proxyReadTimeoutSeconds: 3600
    # -- Proxy send timeout in seconds.
    proxySendTimeoutSeconds: 3600
    # -- Disable proxy buffering.
    proxyBuffering: "off"
    # -- Disable request buffering.
    proxyRequestBuffering: "off"
    # -- HTTP version for proxy upstream.
    proxyHttpVersion: "1.1"
  # -- Host/path rules.
  hosts:
    - host: agent-zero.example.com
      paths:
        - path: /
          pathType: Prefix
  # -- TLS host/secret blocks.
  tls: []

# -- Gateway API HTTPRoute configuration (for example Envoy Gateway).
gatewayApi:
  # -- Enable HTTPRoute resource creation.
  enabled: false
  # -- HTTPRoute annotations.
  annotations: {}
  # -- HTTPRoute labels.
  labels: {}
  # -- ParentRefs for HTTPRoute.
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: http
  # -- Hostnames served by this route.
  hostnames:
    - agent-zero.example.com
  # -- Match rules for the HTTPRoute rule.
  matches:
    - path:
        type: PathPrefix
        value: "/"
  # -- Optional filters for the HTTPRoute rule.
  filters: []
  # -- Optional backend references. Defaults to this chart service when empty.
  backendRefs: []

# -- RuntimeClass names.
runtimeClass:
  # -- RuntimeClass for deployment pods.
  pods: ""
  # -- RuntimeClass for test pods.
  tests: ""

# -- Persistence settings for Agent Zero user data directory (`/a0/usr`).
persistence:
  # -- Enable persistent storage.
  enabled: true
  # -- Keep PVC when Helm release is deleted.
  retain: false
  # -- Existing PVC to use instead of creating one.
  existingClaim: ""
  # -- PVC storage size.
  size: 10Gi
  # -- PVC storageClass.
  storageClass: ""
  # -- PVC access modes.
  accessModes:
    - ReadWriteOnce
  # -- PVC annotations.
  annotations: {}
  # -- PVC volumeName binding.
  volumeName: ""
  # -- Mount path inside container.
  # @description Upstream recommends persisting `/a0/usr` and avoiding full `/a0` mounts.
  mountPath: /a0/usr

# -- Optional tmp volume.
tmpVolume:
  # -- Mount writable emptyDir at /tmp.
  enabled: true
  # -- Mount path inside container.
  mountPath: /tmp
  # -- Optional size limit.
  sizeLimit: 1Gi

# -- Optional host docker socket mount.
# @description High-risk option. Enable only when your workload explicitly needs host Docker access.
hostDockerSocket:
  # -- Mount host docker socket into the pod.
  enabled: false
  # -- Host socket path.
  hostPath: /var/run/docker.sock
  # -- Container mount path.
  mountPath: /var/run/docker.sock
  # -- HostPath type.
  type: Socket
  # -- Read-only mount for docker socket.
  readOnly: false

# -- Optional VPN sidecar settings.
vpn:
  # -- VPN sidecar provider.
  # @description Supported: `none`, `netbird`, `tailscale`.
  provider: none
  netbird:
    image:
      # -- NetBird sidecar image repository.
      repository: netbirdio/netbird
      # -- NetBird sidecar image pull policy.
      pullPolicy: IfNotPresent
      # -- NetBird sidecar image tag.
      tag: 0.66.0-rootless
    setupKeySecret:
      # -- Secret name containing NetBird setup key.
      name: ""
      # -- Secret key name containing NetBird setup key.
      key: ""
    # -- NetBird management URL.
    managementUrl: https://api.netbird.io:443
    # -- NetBird admin URL.
    adminUrl: https://app.netbird.io:443
    # -- Optional extra DNS labels (comma-separated).
    extraDnsLabels: ""
    socks5:
      # -- SOCKS5 listener port for NetBird netstack mode.
      port: 1080
    proxyEnv:
      # -- Inject proxy environment variables into the Agent Zero container.
      enabled: true
      # -- Optional full proxy URL override. When empty, `socks5://127.0.0.1:<socks5.port>` is used.
      proxyUrl: ""
      # -- Inject `ALL_PROXY`.
      injectAllProxy: true
      # -- Inject `HTTP_PROXY`.
      injectHttpProxy: true
      # -- Inject `HTTPS_PROXY`.
      injectHttpsProxy: true
      # -- `NO_PROXY` value injected when `enabled=true`.
      noProxy: "127.0.0.1,localhost,.svc,.svc.cluster.local"
    # -- Optional host aliases used by all pod containers (for example mapping `ollama.netbird.local` to a peer IP).
    hostAliases: []
    # - ip: "100.80.12.10"
    #   hostnames:
    #     - ollama.netbird.local
    persistence:
      # -- Persist NetBird state (`/var/lib/netbird`).
      enabled: false
      # -- Keep NetBird state PVC when Helm release is deleted.
      retain: false
      # -- Existing PVC to use for NetBird state.
      existingClaim: ""
      # -- NetBird state PVC storage size.
      size: 250Mi
      # -- NetBird state PVC storageClass.
      storageClass: ""
      # -- NetBird state PVC access modes.
      accessModes:
        - ReadWriteOnce
      # -- NetBird state PVC annotations.
      annotations: {}
      # -- NetBird state PVC volumeName binding.
      volumeName: ""
    cnps:
      # -- Append NetBird STUN/P2P egress defaults (UDP/3478 and UDP/49152-65535) to app CNP egress rules.
      # @description Keep disabled in restricted environments that only allow HTTPS egress.
      enableStunAndP2PPorts: false
    # -- NetBird sidecar resource requests and limits.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # -- NetBird sidecar security context.
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
  tailscale:
    image:
      # -- Tailscale sidecar image repository.
      repository: ghcr.io/tailscale/tailscale
      # -- Tailscale sidecar image pull policy.
      pullPolicy: IfNotPresent
      # -- Tailscale sidecar image tag.
      tag: v1.94.2
    authKeySecret:
      # -- Secret name containing Tailscale auth key.
      name: ""
      # -- Secret key name containing Tailscale auth key.
      key: ""
    # -- Optional explicit node hostname. Defaults to pod name when empty.
    hostname: ""
    # -- Keep userspace mode enabled (restricted-env baseline).
    userspace: true
    # -- Only authenticate when the node is not already logged in.
    authOnce: true
    # -- Accept tailnet DNS settings on the sidecar.
    acceptDns: false
    # -- Additional `tailscale up` args.
    extraArgs: ""
    # -- Additional `tailscaled` args.
    tailscaledExtraArgs: ""
    # -- Optional Kubernetes Secret state backend name.
    # @description Empty value disables kube-API state storage (`TS_KUBE_SECRET=""`) and uses filesystem state.
    kubeSecretStateName: ""
    socks5:
      # -- Enable SOCKS5 proxy listener for pod-local traffic.
      enabled: true
      # -- SOCKS5 listener bind address.
      bindAddress: 127.0.0.1
      # -- SOCKS5 listener port.
      port: 1055
    httpProxy:
      # -- Enable outbound HTTP proxy listener for pod-local traffic.
      enabled: true
      # -- HTTP proxy listener bind address.
      bindAddress: 127.0.0.1
      # -- HTTP proxy listener port.
      port: 1056
    proxyEnv:
      # -- Inject proxy environment variables into the Agent Zero container.
      enabled: true
      # -- Optional explicit SOCKS proxy URL override.
      socksProxyUrl: ""
      # -- Optional explicit HTTP proxy URL override.
      httpProxyUrl: ""
      # -- Inject `ALL_PROXY`.
      injectAllProxy: true
      # -- Inject `HTTP_PROXY`.
      injectHttpProxy: true
      # -- Inject `HTTPS_PROXY`.
      injectHttpsProxy: true
      # -- `NO_PROXY` value injected when `enabled=true`.
      noProxy: "127.0.0.1,localhost,.svc,.svc.cluster.local"
    # -- Optional host aliases used by all pod containers.
    hostAliases: []
    persistence:
      # -- Persist Tailscale state (`/var/lib/tailscale`).
      enabled: false
      # -- Keep Tailscale state PVC when Helm release is deleted.
      retain: false
      # -- Existing PVC to use for Tailscale state.
      existingClaim: ""
      # -- Tailscale state PVC storage size.
      size: 250Mi
      # -- Tailscale state PVC storageClass.
      storageClass: ""
      # -- Tailscale state PVC access modes.
      accessModes:
        - ReadWriteOnce
      # -- Tailscale state PVC annotations.
      annotations: {}
      # -- Tailscale state PVC volumeName binding.
      volumeName: ""
    cnps:
      # -- Append Tailscale STUN egress port (UDP/3478) to app CNP egress rules.
      enableStunPort: false
      # -- Append Tailscale direct-connect egress port (UDP/41641) to app CNP egress rules.
      enableDirectUdpPort: false
    # -- Tailscale sidecar resource requests and limits.
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # -- Tailscale sidecar security context.
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL

# -- Additional plain environment variables.
# @description Do not place secrets in this map.
env: {}

# -- Import all keys from listed secrets as environment variables.
envFromSecrets: []

# -- Import all keys from listed configmaps as environment variables.
envFromConfigMaps: []

# -- Additional env vars from explicit secret refs.
# @description Supports either map (ENV_NAME -> secretName) or list objects ({name, secretName, secretKey}).
additionalEnvSecrets: {}

# -- Extra command override.
command: []

# -- Extra args override.
args: []

# -- Mount additional volumeMounts.
extraVolumeMounts: []

# -- Add additional pod volumes.
extraVolumes: []

# -- Enable health probes.
applyHealthChecks: true

# -- Liveness probe.
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 60
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

# -- Readiness probe.
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

# -- Startup probe.
startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

# -- Pod-level security context.
podSecurityContext: {}

# -- Container-level security context.
# @description Upstream image is multi-process and expects writable filesystem; avoid aggressive hardening unless validated.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

# -- Resource requests and limits.
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 4Gi

# -- HorizontalPodAutoscaler configuration.
autoscaling:
  # -- Enable autoscaling.
  enabled: false
  # -- Minimum replicas.
  minReplicas: 1
  # -- Maximum replicas.
  maxReplicas: 3
  # -- Target CPU utilization percentage.
  targetCPUUtilizationPercentage: 80
  # -- Enable memory utilization metric.
  enableMemoryUtilization: false
  # -- Target memory utilization percentage.
  targetMemoryUtilizationPercentage: 80

# -- Pod annotations.
podAnnotations: {}

# -- Pod labels.
podLabels: {}

# -- Workload node selector.
nodeSelector: {}

# -- Workload tolerations.
tolerations: []

# -- Workload affinity.
affinity: {}

# -- Cilium policy library toggle.
libchartCnps:
  # -- Enable libchart-cnps templates.
  enabled: true
  # -- Include CNPG policy set from library.
  includeCnpgPolicies: false

# -- App-specific Cilium policy settings.
cnps:
  appTraffic:
    ingress:
      # -- Allow ingress traffic to app pods.
      allow: true
      # -- Allowed ingress endpoint label sets.
      # @description Leave empty to use conditional defaults from template logic: ingress-nginx labels when ingress.enabled=true, envoy-gateway labels when gatewayApi.enabled=true, or both when both are enabled.
      fromEndpoints: []
      # -- Optional allowed ingress entities.
      fromEntities: []
    egress:
      # -- Allow egress traffic from app pods.
      allow: true
      # -- Optional destination entities.
      toEntities:
        - world
      # -- Allowed egress ports.
      toPorts:
        # -- DNS (53/UDP) is already covered by the namespace-wide libchart policy.
        - port: "80"
          protocol: TCP
        - port: "443"
          protocol: TCP
