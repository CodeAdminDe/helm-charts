apiVersion: v2
name: agent-zero
description: A Helm chart for deploying Agent Zero (AI Operating System) on Kubernetes.
type: application
# renovate: bumpVersion
version: 0.1.5
# renovate: image=agent0ai/agent-zero
appVersion: "v0.9.8.2"
kubeVersion: ">=1.24.0"
home: https://github.com/CodeAdminDe/helm-charts
keywords:
  - agent-zero
  - ai
  - llm
  - mcp
  - automation
  - cloud-native
  - helm
maintainers:
  - name: Frederic Roggon
    email: frederic.roggon@codeadmin.de
    url: https://github.com/CodeAdminDe
dependencies:
  - name: libchart-cnps
    version: 0.2.1
    repository: https://codeadminde.github.io/helm-charts
    alias: libchart-cnps
    condition: libchartCnps.enabled
annotations:
  category: AI
  securityContext: "compatible"
  images: |
    - name: agent-zero
      image: agent0ai/agent-zero:v0.9.8.2
    - name: netbird-sidecar
      image: netbirdio/netbird:0.66.4-rootless
    - name: tailscale-sidecar
      image: ghcr.io/tailscale/tailscale:v1.94.2
