apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mastodon.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mastodon.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37
      command: ["sh", "-ec"]
      args:
        - |
          set -euo pipefail
          wget -q --spider --timeout=10 "http://{{ include "mastodon.upstreamWebServiceName" . }}:{{ default 3000 .Values.upstream.mastodon.web.port }}/"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
