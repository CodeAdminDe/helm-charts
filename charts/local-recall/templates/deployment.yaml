{{- $postgresMode := eq (default "chromem" .Values.localRecall.vectorEngine) "postgres" -}}
{{- $cnpgMode := and $postgresMode .Values.database.useCnpgCluster.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "local-recall.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "local-recall.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "local-recall.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "local-recall.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "local-recall.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "local-recall.name" . }}
          image: {{ include "local-recall.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.targetProtocol }}
          env:
            - name: LISTENING_ADDRESS
              value: {{ .Values.localRecall.listeningAddress | quote }}
            - name: VECTOR_ENGINE
              value: {{ .Values.localRecall.vectorEngine | quote }}
            - name: COLLECTION_DB_PATH
              value: {{ .Values.localRecall.collectionDbPath | quote }}
            - name: FILE_ASSETS
              value: {{ .Values.localRecall.fileAssets | quote }}
            - name: EMBEDDING_MODEL
              value: {{ .Values.localRecall.embeddingModel | quote }}
            - name: OPENAI_BASE_URL
              value: {{ .Values.localRecall.openAIBaseUrl | quote }}
            - name: MAX_CHUNKING_SIZE
              value: {{ printf "%v" .Values.localRecall.maxChunkingSize | quote }}
            - name: CHUNK_OVERLAP
              value: {{ printf "%v" .Values.localRecall.chunkOverlap | quote }}
            {{- if .Values.localRecall.openAIApiKeySecret.name }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.localRecall.openAIApiKeySecret.name }}
                  key: {{ .Values.localRecall.openAIApiKeySecret.key | quote }}
            {{- end }}
            {{- if .Values.localRecall.apiKeysSecret.name }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.localRecall.apiKeysSecret.name }}
                  key: {{ .Values.localRecall.apiKeysSecret.key | quote }}
            {{- end }}
            {{- if .Values.localRecall.gitPrivateKeySecret.name }}
            - name: GIT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.localRecall.gitPrivateKeySecret.name }}
                  key: {{ .Values.localRecall.gitPrivateKeySecret.key | quote }}
            {{- end }}
            {{- if $postgresMode }}
            {{- if $cnpgMode }}
            - name: DB_HOST
              value: {{ printf "%s-rw" .Values.database.useCnpgCluster.clusterName | quote }}
            - name: DB_PORT
              value: {{ printf "%v" .Values.database.useCnpgCluster.port | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "local-recall.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.database | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "local-recall.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "local-recall.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.password | quote }}
            {{- else }}
            - name: DB_HOST
              value: {{ .Values.database.postgres.host | quote }}
            - name: DB_PORT
              value: {{ printf "%v" .Values.database.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.postgres.database | quote }}
            - name: DB_USER
              value: {{ .Values.database.postgres.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.passwordSecret.name }}
                  key: {{ .Values.database.postgres.passwordSecret.key | quote }}
            {{- end }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.postgres.ssl | quote }}
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=$(DB_SSL_MODE)"
            - name: HYBRID_SEARCH_BM25_WEIGHT
              value: {{ printf "%v" .Values.database.hybridSearch.bm25Weight | quote }}
            - name: HYBRID_SEARCH_VECTOR_WEIGHT
              value: {{ printf "%v" .Values.database.hybridSearch.vectorWeight | quote }}
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if kindIs "map" .Values.additionalEnvSecrets }}
            {{- range $envName, $secretConfig := .Values.additionalEnvSecrets }}
            {{- if kindIs "string" $secretConfig }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretConfig }}
                  key: {{ $envName | quote }}
            {{- else if kindIs "map" $secretConfig }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- if $secretName }}
            - name: {{ default $envName (index $secretConfig "name") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- else if kindIs "slice" .Values.additionalEnvSecrets }}
            {{- range $secretConfig := .Values.additionalEnvSecrets }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- $envName := (default "" (index $secretConfig "name")) }}
            {{- if and $secretName $envName }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.applyHealthChecks }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "local-recall.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir:
            {{- with .Values.tmpVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
