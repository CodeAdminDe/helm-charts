apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kagent.fullname" . }}-test-connection"
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  activeDeadlineSeconds: 60
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.37
      imagePullPolicy: IfNotPresent
      command: ["wget"]
      args:
        - "--spider"
        - "--timeout=10"
        - "--tries=3"
        - {{ printf "http://%s:%v/health" (ternary (printf "%s-ui" (include "kagent.fullname" .)) (printf "%s-controller" (include "kagent.fullname" .)) .Values.ui.enabled) (ternary .Values.ui.service.port .Values.controller.service.port .Values.ui.enabled) | quote }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop:
            - ALL
  restartPolicy: Never
