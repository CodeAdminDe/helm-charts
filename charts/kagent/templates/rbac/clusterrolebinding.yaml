{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.suffixName" (list (include "kagent.fullname" .) "getter-rb") }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.rbacGetterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.controller.serviceAccountName" . }}
    namespace: {{ include "kagent.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.suffixName" (list (include "kagent.fullname" .) "writer-rb") }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.rbacWriterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.controller.serviceAccountName" . }}
    namespace: {{ include "kagent.namespace" . }}
{{- end }}
