{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.rbacGetterRoleName" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.getterRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.rbacWriterRoleName" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.writerRules | nindent 2 }}
{{- end }}
