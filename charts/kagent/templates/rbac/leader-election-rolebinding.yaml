{{- if and .Values.rbac.create .Values.rbac.createLeaderElectionRole (eq (include "kagent.leaderElectionEnabled" .) "true") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kagent.suffixName" (list (include "kagent.fullname" .) "leader-rb") }}
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kagent.rbacLeaderElectionRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.controller.serviceAccountName" . }}
    namespace: {{ include "kagent.namespace" . }}
{{- end }}
