{{- if and .Values.modelConfig.enabled .Values.modelConfig.createSecretFromApiKeyValues }}
{{- $providerKey := .Values.providers.default | default "openAI" -}}
{{- if hasKey .Values.providers $providerKey -}}
{{- $provider := index .Values.providers $providerKey -}}
{{- if and $provider.apiKeySecretRef $provider.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $provider.apiKeySecretRef | quote }}
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $keyName := $provider.apiKeySecretKey | default (printf "%s_API_KEY" ($provider.provider | upper)) -}}
  {{ $keyName }}: {{ $provider.apiKey | b64enc }}
{{- end }}
{{- end }}
{{- end }}
