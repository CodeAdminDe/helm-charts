apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent.fullname" . }}-controller
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
spec:
  {{- if not .Values.controller.autoscaling.enabled }}
  replicas: {{ .Values.controller.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kagent.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kagent.controller.selectorLabels" . | nindent 8 }}
        kagent.cnp/default-deny: "true"
        {{- with .Values.controller.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/controller-configmap.yaml") . | sha256sum }}
        checksum/modelconfig: {{ include (print $.Template.BasePath "/modelconfig.yaml") . | sha256sum }}
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.controller.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kagent.controller.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.controller.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- with .Values.controller.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (eq .Values.database.type "sqlite") (gt (len .Values.controller.volumes) 0) }}
      volumes:
        {{- if eq .Values.database.type "sqlite" }}
        - name: sqlite-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "kagent.persistenceClaimName" . }}
          {{- else if .Values.persistence.emptyDir.enabled }}
          emptyDir:
            {{- if .Values.persistence.emptyDir.medium }}
            medium: {{ .Values.persistence.emptyDir.medium }}
            {{- end }}
            {{- if .Values.persistence.emptyDir.sizeLimit }}
            sizeLimit: {{ .Values.persistence.emptyDir.sizeLimit }}
            {{- end }}
          {{- end }}
        {{- end }}
        {{- with .Values.controller.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "kagent.controller.image" . }}
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.targetPort }}
              protocol: {{ .Values.controller.service.targetProtocol }}
          env:
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if and (eq .Values.database.type "postgres") .Values.database.useCnpgCluster.enabled }}
            - name: POSTGRES_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kagent.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.uri | quote }}
            {{- else if and (eq .Values.database.type "postgres") .Values.database.postgres.urlSecret.name }}
            - name: POSTGRES_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.urlSecret.name }}
                  key: {{ .Values.database.postgres.urlSecret.key | quote }}
            {{- else if and (eq .Values.database.type "postgres") .Values.database.postgres.url }}
            - name: POSTGRES_DATABASE_URL
              value: {{ .Values.database.postgres.url | quote }}
            {{- end }}
            {{- with .Values.controller.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kagent.fullname" . }}-controller
            {{- with .Values.controller.envFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controller.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.controller.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.controller.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.controller.startupProbe | nindent 12 }}
          {{- if or (eq .Values.database.type "sqlite") (gt (len .Values.controller.volumeMounts) 0) }}
          volumeMounts:
            {{- if eq .Values.database.type "sqlite" }}
            - name: sqlite-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- with .Values.controller.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
