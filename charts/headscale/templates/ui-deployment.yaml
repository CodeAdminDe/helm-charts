{{- if .Values.ui.enabled }}
{{- $provider := include "headscale.ui.provider" . -}}
{{- $isHeadplane := eq $provider "headplane" -}}
{{- $image := .Values.ui.image -}}
{{- $service := .Values.ui.service -}}
{{- $uiPodSecurityContext := deepCopy (.Values.ui.podSecurityContext | default dict) -}}
{{- $uiSecurityContext := deepCopy (.Values.ui.securityContext | default dict) -}}
{{- if $isHeadplane -}}
{{- $image = .Values.ui.headplane.image -}}
{{- $service = .Values.ui.headplane.service -}}
{{- end -}}
{{- if .Values.applySecurity -}}
  {{- if $isHeadplane -}}
    {{- if not (hasKey $uiPodSecurityContext "fsGroup") -}}
      {{- $_ := set $uiPodSecurityContext "fsGroup" 65532 -}}
    {{- end -}}
    {{- if not (hasKey $uiSecurityContext "runAsUser") -}}
      {{- $_ := set $uiSecurityContext "runAsUser" 65532 -}}
    {{- end -}}
    {{- if not (hasKey $uiSecurityContext "runAsGroup") -}}
      {{- $_ := set $uiSecurityContext "runAsGroup" 65532 -}}
    {{- end -}}
  {{- else -}}
    {{- if not (hasKey $uiPodSecurityContext "fsGroup") -}}
      {{- $_ := set $uiPodSecurityContext "fsGroup" 1000 -}}
    {{- end -}}
    {{- if not (hasKey $uiSecurityContext "runAsUser") -}}
      {{- $_ := set $uiSecurityContext "runAsUser" 1000 -}}
    {{- end -}}
    {{- if not (hasKey $uiSecurityContext "runAsGroup") -}}
      {{- $_ := set $uiSecurityContext "runAsGroup" 1000 -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- $podAnnotations := dict "checksum/values" (toJson .Values.ui | sha256sum) -}}
{{- if $isHeadplane -}}
{{- $_ := set $podAnnotations "checksum/config" (include "headscale.ui.headplane.configChecksum" .) -}}
{{- end -}}
{{- range $key, $val := .Values.ui.podAnnotations -}}
{{- $_ := set $podAnnotations $key ($val | toString) -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "headscale.ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "headscale.ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      {{- include "headscale.ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "headscale.ui.selectorLabels" . | nindent 8 }}
        {{- with .Values.ui.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- toYaml $podAnnotations | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "headscale.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- if and .Values.applySecurity $uiPodSecurityContext }}
      securityContext:
        {{- toYaml $uiPodSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ ternary "headplane" "headscale-ui" $isHeadplane }}
          image: "{{ $image.repository }}:{{ $image.tag }}"
          imagePullPolicy: {{ $image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.targetPort }}
              protocol: {{ $service.targetProtocol }}
          {{- if or .Values.ui.env $isHeadplane }}
          env:
            {{- range $key, $value := .Values.ui.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if $isHeadplane }}
            - name: HEADPLANE_CONFIG_PATH
              value: /etc/headplane/config.yaml
            {{- range $key, $value := .Values.ui.headplane.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.ui.headplane.apiKeySecret.name }}
            - name: HEADPLANE_HEADSCALE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ui.headplane.apiKeySecret.name }}
                  key: {{ .Values.ui.headplane.apiKeySecret.key | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          volumeMounts:
            {{- if $isHeadplane }}
            - name: headplane-data
              mountPath: /var/lib/headplane
            - name: headplane-tmp
              mountPath: /tmp
            - name: headplane-config
              mountPath: /etc/headplane/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: headplane-secrets
              mountPath: /var/run/headplane-secrets
              readOnly: true
            {{- else }}
            - name: headscale-ui-data
              mountPath: /data
            - name: headscale-ui-tmp
              mountPath: /tmp
            {{- end }}
          {{- if and .Values.applySecurity $uiSecurityContext }}
          securityContext:
            {{- toYaml $uiSecurityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.applyHealthChecks }}
          livenessProbe:
            {{- toYaml .Values.ui.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.ui.readinessProbe | nindent 12 }}
          {{- end }}
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        {{- if $isHeadplane }}
        - name: headplane-data
          emptyDir:
            sizeLimit: {{ .Values.ui.storage.dataDirSizeLimit }}
        - name: headplane-tmp
          emptyDir:
            sizeLimit: {{ .Values.ui.storage.tmpDirSizeLimit }}
        - name: headplane-config
          configMap:
            name: {{ include "headscale.ui.generatedConfigName" . }}
        - name: headplane-secrets
          secret:
            secretName: {{ .Values.ui.headplane.secret.name }}
        {{- else }}
        - name: headscale-ui-data
          emptyDir:
            sizeLimit: {{ .Values.ui.storage.dataDirSizeLimit }}
        - name: headscale-ui-tmp
          emptyDir:
            sizeLimit: {{ .Values.ui.storage.tmpDirSizeLimit }}
        {{- end }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
