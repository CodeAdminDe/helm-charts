{{- $tlsEnabled := or (ne .Values.headscale.tls.certPath "") (ne .Values.headscale.tls.keyPath "") (ne .Values.headscale.tls.letsencrypt.hostname "") -}}
{{- $scheme := ternary "https" "http" $tlsEnabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "headscale.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  containers:
    - name: wget
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          wget {{- if $tlsEnabled }} --no-check-certificate{{- end }} -qO- {{ $scheme }}://{{ include "headscale.fullname" . }}:{{ .Values.service.http.port }}/health
          {{- if .Values.ui.enabled }}
          wget -qO- http://{{ include "headscale.ui.fullname" . }}:{{ .Values.ui.service.port }}/web
          {{- end }}
  restartPolicy: Never
