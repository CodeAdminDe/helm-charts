{{- define "headscale.CiliumNetworkPolicies-NamespaceSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-NamespaceSet" (list . "headscale.CiliumNetworkPolicies-NamespaceSet") }}
---
{{- end -}}

{{- define "headscale.CiliumNetworkPolicies-CnpgSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
{{- end -}}

{{- if and .Values.libchartCnps.enabled .Values.libchartCnps.includeCnpgPolicies (eq .Values.database.mode "postgres") .Values.database.useCnpgCluster.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-CnpgSet" (list . "headscale.CiliumNetworkPolicies-CnpgSet") }}
---
{{- end -}}

{{- define "headscale.CiliumNetworkPolicies-AppSet" -}}
{{- $ingressPorts := list (dict "port" (printf "%v" .Values.service.http.targetPort) "protocol" (.Values.service.http.targetProtocol | default "TCP")) -}}
{{- if and .Values.cnps.appTraffic.ingress.includeGrpcPort .Values.service.grpc.enabled -}}
{{- $ingressPorts = append $ingressPorts (dict "port" (printf "%v" .Values.service.grpc.targetPort) "protocol" (.Values.service.grpc.targetProtocol | default "TCP")) -}}
{{- end -}}
{{- if and .Values.cnps.appTraffic.ingress.includeMetricsPort .Values.service.metrics.enabled -}}
{{- $ingressPorts = append $ingressPorts (dict "port" (printf "%v" .Values.service.metrics.targetPort) "protocol" (.Values.service.metrics.targetProtocol | default "TCP")) -}}
{{- end -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "headscale.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "headscale.selectorLabels" . | nindent 6 }}
  {{- if .Values.cnps.appTraffic.ingress.allow }}
  ingress:
    - fromEndpoints:
        - matchLabels:
          {{- if .Values.cnps.appTraffic.ingress.matchLabels }}
          {{- range $k, $v := .Values.cnps.appTraffic.ingress.matchLabels }}
            {{ $k }}: {{ $v }}
          {{- end }}
          {{- else }}
            app.kubernetes.io/name: ingress-nginx
            io.kubernetes.pod.namespace: ingress-nginx
          {{- end }}
      toPorts:
        - ports:
          {{- range $ingressPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
  {{- end }}
  {{- if .Values.cnps.appTraffic.egress.allow }}
  egress:
    {{- if .Values.cnps.appTraffic.egress.matchLabels }}
    - toEndpoints:
        - matchLabels:
          {{- range $k, $v := .Values.cnps.appTraffic.egress.matchLabels }}
            {{ $k }}: {{ $v }}
          {{- end }}
      toPorts:
        - ports:
          {{- range .Values.cnps.appTraffic.egress.toPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
    {{- end }}
    - toEntities:
      {{- if .Values.cnps.appTraffic.egress.toEntities }}
        {{- toYaml .Values.cnps.appTraffic.egress.toEntities | nindent 8 }}
      {{- else }}
        - world
      {{- end }}
      toPorts:
        - ports:
          {{- if .Values.cnps.appTraffic.egress.toPorts }}
          {{- range .Values.cnps.appTraffic.egress.toPorts }}
            - port: {{ .port | quote }}
              protocol: {{ .protocol }}
          {{- end }}
          {{- else }}
            - port: "443"
              protocol: TCP
          {{- end }}
  {{- end }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-AppSet" (list . "headscale.CiliumNetworkPolicies-AppSet") }}
{{- end -}}
