{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/reverse-proxy resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if and .Values.ingress.enabled .Values.ingress.secureDefaults.enabled .Values.ingress.secureDefaults.websocket.enabled (empty .Values.ingress.secureDefaults.websocket.annotationKey) -}}
{{- fail "ingress.secureDefaults.websocket.annotationKey must be set when ingress websocket secure defaults are enabled." -}}
{{- end -}}

{{- if and .Values.config.existingSecret.name (empty .Values.config.existingSecret.key) -}}
{{- fail "config.existingSecret.key must be set when config.existingSecret.name is provided." -}}
{{- end -}}

{{- if not (or (eq .Values.database.mode "sqlite") (eq .Values.database.mode "postgres")) -}}
{{- fail "database.mode must be either 'sqlite' or 'postgres'." -}}
{{- end -}}

{{- if and (eq .Values.database.mode "sqlite") .Values.database.useCnpgCluster.enabled -}}
{{- fail "database.useCnpgCluster.enabled=true requires database.mode=postgres." -}}
{{- end -}}

{{- if and (eq .Values.database.mode "sqlite") .Values.autoscaling.enabled -}}
{{- fail "autoscaling.enabled is not supported with sqlite mode. Keep a single replica writer." -}}
{{- end -}}

{{- if and (eq .Values.database.mode "sqlite") (ne (int .Values.replicaCount) 1) -}}
{{- fail "replicaCount must be 1 when database.mode=sqlite." -}}
{{- end -}}

{{- if eq .Values.database.mode "postgres" -}}
  {{- if .Values.database.useCnpgCluster.enabled -}}
    {{- if empty .Values.database.useCnpgCluster.clusterName -}}
      {{- fail "database.useCnpgCluster.clusterName must be set when CNPG mode is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.database -}}
      {{- fail "database.useCnpgCluster.secretKeys.database must be set when CNPG mode is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.username -}}
      {{- fail "database.useCnpgCluster.secretKeys.username must be set when CNPG mode is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.password -}}
      {{- fail "database.useCnpgCluster.secretKeys.password must be set when CNPG mode is enabled." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.database.postgres.host -}}
      {{- fail "database.postgres.host must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.name -}}
      {{- fail "database.postgres.name must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.user -}}
      {{- fail "database.postgres.user must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.name -}}
      {{- fail "database.postgres.passwordSecret.name must be set when database.mode=postgres and CNPG mode is disabled." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not (and (eq .Values.database.mode "postgres") .Values.database.useCnpgCluster.enabled)) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires postgres mode with database.useCnpgCluster.enabled=true." -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.headscale.dns.overrideLocalDns (empty .Values.headscale.dns.nameserversGlobal) -}}
{{- fail "headscale.dns.nameserversGlobal must be set when headscale.dns.overrideLocalDns=true." -}}
{{- end -}}

{{- if and (eq .Values.headscale.policy.mode "file") (empty .Values.headscale.policy.path) -}}
{{- fail "headscale.policy.path must be set when headscale.policy.mode=file." -}}
{{- end -}}
