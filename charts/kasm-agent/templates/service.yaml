{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kasm-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kasm-agent.labels" . | nindent 4 }}
    {{- with .Values.labels }}{{ toYaml . | nindent 4 }}{{- end }}
    {{- with .Values.service.labels }}{{ toYaml . | nindent 4 }}{{- end }}
    {{- with .Values.extraLabels.service }}{{ toYaml . | nindent 4 }}{{- end }}
  {{- if or .Values.annotations.service .Values.service.annotations }}
  annotations:
    {{- with .Values.annotations.service }}{{ toYaml . | nindent 4 }}{{- end }}
    {{- with .Values.service.annotations }}{{ toYaml . | nindent 4 }}{{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "kasm-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: agent
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: {{ .Values.service.targetProtocol }}
{{- end }}
