{{- if .Values.service.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kasm-agent.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kasm-agent.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  activeDeadlineSeconds: 30
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
  containers:
    - name: wget
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command: ["wget"]
      args: ["--spider", "--timeout=10", "--tries=1", "{{ include "kasm-agent.fullname" . }}:{{ .Values.service.port }}"]
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
  restartPolicy: Never
{{- end }}
