{{- if not (or (eq .Values.mode.architecture "legacy") (eq .Values.mode.architecture "combined")) -}}
{{- fail "mode.architecture must be either 'legacy' or 'combined'" -}}
{{- end }}

{{- if and (eq .Values.mode.architecture "combined") (not .Values.server.enabled) -}}
{{- fail "mode.architecture is 'combined' but server.enabled is false" -}}
{{- end }}

{{- if and (eq .Values.mode.architecture "legacy") (not .Values.management.enabled) -}}
{{- fail "mode.architecture is 'legacy' but management.enabled is false" -}}
{{- end }}

{{- if not (or (eq .Values.auth.externalProviders.managedBy.mode "helm") (eq .Values.auth.externalProviders.managedBy.mode "api")) -}}
{{- fail "auth.externalProviders.managedBy.mode must be either 'helm' or 'api'" -}}
{{- end -}}

{{- if and .Values.auth.externalProviders.apiJob.enabled (ne .Values.auth.externalProviders.managedBy.mode "api") -}}
{{- fail "auth.externalProviders.apiJob.enabled requires auth.externalProviders.managedBy.mode to be 'api'" -}}
{{- end -}}

{{- if and .Values.auth.externalProviders.apiJob.enabled (eq .Values.auth.externalProviders.managedBy.mode "api") -}}
{{- if empty .Values.auth.externalProviders.apiJob.managementUrl -}}
{{- fail "auth.externalProviders.apiJob.managementUrl must be set when apiJob.enabled is true" -}}
{{- end -}}
{{- if empty .Values.auth.externalProviders.apiJob.tokenSecretName -}}
{{- fail "auth.externalProviders.apiJob.tokenSecretName must be set when apiJob.enabled is true" -}}
{{- end -}}
{{- if empty .Values.auth.externalProviders.apiJob.payloadSecretName -}}
{{- fail "auth.externalProviders.apiJob.payloadSecretName must be set when apiJob.enabled is true" -}}
{{- end -}}
{{- if empty .Values.auth.externalProviders.apiJob.payloadSecretKey -}}
{{- fail "auth.externalProviders.apiJob.payloadSecretKey must be set when apiJob.enabled is true" -}}
{{- end -}}
{{- end -}}

{{- if and .Values.dashboard.enabled (not (or (eq .Values.dashboard.auth.mode "legacy") (eq .Values.dashboard.auth.mode "custom"))) -}}
{{- fail "dashboard.auth.mode must be either 'legacy' or 'custom'" -}}
{{- end -}}
{{- if and .Values.dashboard.enabled (not (or (eq .Values.dashboard.auth.tokenSource "accessToken") (eq .Values.dashboard.auth.tokenSource "idToken"))) -}}
{{- fail "dashboard.auth.tokenSource must be either 'accessToken' or 'idToken'" -}}
{{- end -}}

{{- if and .Values.dashboard.enabled (eq .Values.dashboard.auth.mode "custom") -}}
{{- if empty .Values.dashboard.auth.issuer -}}
{{- fail "dashboard.auth.issuer must be set when dashboard.auth.mode is custom" -}}
{{- end -}}
{{- if empty .Values.dashboard.auth.clientId -}}
{{- fail "dashboard.auth.clientId must be set when dashboard.auth.mode is custom" -}}
{{- end -}}
{{- end -}}
