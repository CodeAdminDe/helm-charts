{{- if and .Values.auth.externalProviders.apiJob.enabled (eq .Values.auth.externalProviders.managedBy.mode "api") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "netbird-management.fullname" . }}-idp-sync-payload
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: idp-sync
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
data:
  payload.json: |-
{{- if .Values.auth.externalProviders.apiJob.payload }}
{{ .Values.auth.externalProviders.apiJob.payload | nindent 4 }}
{{- else }}
    {}
{{- end }}
{{- end }}
