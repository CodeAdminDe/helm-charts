{{- if and .Values.server.enabled (eq .Values.mode.architecture "combined") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird-management.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
  - port: {{ .Values.server.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  - port: {{ .Values.server.service.grpcPort }}
    targetPort: grpc
    protocol: TCP
    name: grpc
  - port: {{ .Values.server.service.signalPort }}
    targetPort: signal
    protocol: TCP
    name: signal
  - port: {{ .Values.server.service.metricsPort }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "netbird-management.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
{{- end }}
