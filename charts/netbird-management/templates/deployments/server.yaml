{{- if and .Values.server.enabled (eq .Values.mode.architecture "combined") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netbird-management.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netbird-management.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "netbird-management.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "netbird-management.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmaps/server-config.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
    spec:
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.server.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.server.securityContext.runAsUser }}
        runAsGroup: {{ .Values.server.securityContext.runAsGroup }}
        fsGroup: {{ .Values.server.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault

      serviceAccountName: {{ include "netbird-management.serviceAccountName" . }}

      containers:
      - name: server
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
        imagePullPolicy: {{ .Values.server.image.pullPolicy }}

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: {{ .Values.server.securityContext.readOnlyRootFilesystem }}
          runAsNonRoot: {{ .Values.server.securityContext.runAsNonRoot }}
          runAsUser: {{ .Values.server.securityContext.runAsUser }}
          capabilities:
            drop:
            - ALL

        ports:
        - name: http
          containerPort: {{ .Values.server.port }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.server.grpcPort }}
          protocol: TCP
        - name: signal
          containerPort: {{ .Values.server.signalPort }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.server.metricsPort }}
          protocol: TCP

        {{- if .Values.server.probes.liveness.enabled }}
        livenessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: {{ .Values.server.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.server.probes.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.server.probes.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.server.probes.liveness.failureThreshold }}
        {{- end }}

        {{- if .Values.server.probes.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: {{ .Values.server.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.server.probes.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.server.probes.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.server.probes.readiness.failureThreshold }}
        {{- end }}

        resources:
          requests:
            cpu: {{ .Values.server.resources.requests.cpu }}
            memory: {{ .Values.server.resources.requests.memory }}
          limits:
            cpu: {{ .Values.server.resources.limits.cpu }}
            memory: {{ .Values.server.resources.limits.memory }}

        args:
          - "--config"
          - "/etc/netbird/config.yaml"

        env:
        - name: NETBIRD_STORE_ENGINE_POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.cnpgCluster.appConnectionSecretName }}
              key: uri
        - name: NB_ACTIVITY_EVENT_STORE_ENGINE
          value: "postgres"
        - name: NB_ACTIVITY_EVENT_POSTGRES_DSN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.cnpgCluster.appConnectionSecretName }}
              key: uri
        - name: NETBIRD_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingEncryptionKeySecret | default "netbird-datasrc-encryption" }}
              key: encryptionKey
        - name: NB_LOG_LEVEL
          value: "info"
        - name: NB_LOG_FORMAT
          value: "json"

        volumeMounts:
          - name: {{ .Release.Name }}-server-tmp
            mountPath: /tmp
          - name: {{ .Release.Name }}-server-cache
            mountPath: /var/cache/netbird
          - name: {{ .Release.Name }}-server-data
            mountPath: /var/lib/netbird
          - name: {{ .Release.Name }}-server-config
            mountPath: /etc/netbird
            readOnly: true

      volumes:
        {{- include "common.app.server.pvc" . | nindent 8 }}
        - name: {{ .Release.Name }}-server-tmp
          emptyDir: {}
        - name: {{ .Release.Name }}-server-cache
          emptyDir: {}
        - name: {{ .Release.Name }}-server-config
          configMap:
            name: {{ include "netbird-management.fullname" . }}-server-config
            defaultMode: 0644

      terminationGracePeriodSeconds: 30
{{- end }}
