apiVersion: v1
kind: Pod
metadata:
  name: "netbird-smoke-test"
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  containers:
    - name: wget
      image: busybox:1.35
      command: ["sh", "-c"]
      args:
        - |
          {{- if eq .Values.mode.architecture "combined" }}
          wget -qO- {{ include "netbird-management.fullname" . }}-server:{{ .Values.server.service.port }}/metrics && echo "Server OK"
          {{- else }}
          wget -qO- {{ include "netbird-management.fullname" . }}-management:{{ .Values.management.service.port }}/metrics && echo "Management OK"
          {{- end }}
          {{- if .Values.dashboard.enabled }}
          wget -qO- {{ include "netbird-management.fullname" . }}-dashboard:{{ .Values.dashboard.service.port }}/ && echo "Dashboard OK"
          {{- end }}
  restartPolicy: Never
