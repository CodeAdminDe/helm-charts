{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress or HTTPRoute resources." -}}
{{- end -}}

{{- if and (gt (int .Values.replicaCount) 1) (not .Values.allowMultipleReplicas) -}}
{{- fail "replicaCount>1 requires allowMultipleReplicas=true because the official Paperless container bundles web, consumer, and scheduler processes together." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
  {{- if not (has .Values.gatewayApi.scheme (list "http" "https")) -}}
    {{- fail "gatewayApi.scheme must be either \"http\" or \"https\" when gatewayApi.enabled=true." -}}
  {{- end -}}
{{- end -}}

{{- $additionalEnvSecretsHasPaperlessApps := false -}}
{{- $additionalEnvSecretsHasSocialAccountProviders := false -}}
{{- if kindIs "map" .Values.additionalEnvSecrets -}}
  {{- if hasKey .Values.additionalEnvSecrets "PAPERLESS_APPS" -}}
    {{- $additionalEnvSecretsHasPaperlessApps = true -}}
  {{- end -}}
  {{- if hasKey .Values.additionalEnvSecrets "PAPERLESS_SOCIALACCOUNT_PROVIDERS" -}}
    {{- $additionalEnvSecretsHasSocialAccountProviders = true -}}
  {{- end -}}
{{- else if kindIs "slice" .Values.additionalEnvSecrets -}}
  {{- range $secretConfig := .Values.additionalEnvSecrets -}}
    {{- $envName := (default "" (index $secretConfig "name")) -}}
    {{- if eq $envName "PAPERLESS_APPS" -}}
      {{- $additionalEnvSecretsHasPaperlessApps = true -}}
    {{- end -}}
    {{- if eq $envName "PAPERLESS_SOCIALACCOUNT_PROVIDERS" -}}
      {{- $additionalEnvSecretsHasSocialAccountProviders = true -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and (or .Values.paperless.auth.oidc.enabled (gt (len (.Values.paperless.additionalApps | default (list))) 0)) (or (hasKey .Values.extraEnv "PAPERLESS_APPS") $additionalEnvSecretsHasPaperlessApps) -}}
{{- fail "Use paperless.additionalApps / paperless.auth.oidc instead of extraEnv.PAPERLESS_APPS or additionalEnvSecrets.PAPERLESS_APPS to avoid duplicate env rendering." -}}
{{- end -}}

{{- if and .Values.paperless.auth.oidc.enabled (or (hasKey .Values.extraEnv "PAPERLESS_SOCIALACCOUNT_PROVIDERS") $additionalEnvSecretsHasSocialAccountProviders) -}}
{{- fail "paperless.auth.oidc.enabled=true cannot be combined with extraEnv.PAPERLESS_SOCIALACCOUNT_PROVIDERS or additionalEnvSecrets.PAPERLESS_SOCIALACCOUNT_PROVIDERS. Use paperless.auth.oidc.existingSecret or the structured OIDC values instead." -}}
{{- end -}}

{{- if and .Values.paperless.auth.accountDefaultHttpProtocol (not (has .Values.paperless.auth.accountDefaultHttpProtocol (list "http" "https"))) -}}
{{- fail "paperless.auth.accountDefaultHttpProtocol must be either \"http\" or \"https\" when set." -}}
{{- end -}}

{{- if and .Values.paperless.auth.emailVerification (not (has .Values.paperless.auth.emailVerification (list "mandatory" "optional" "none"))) -}}
{{- fail "paperless.auth.emailVerification must be one of: mandatory, optional, none." -}}
{{- end -}}

{{- if ne .Values.paperless.auth.emailUnknownAccounts nil -}}
  {{- if not (kindIs "bool" .Values.paperless.auth.emailUnknownAccounts) -}}
    {{- fail "paperless.auth.emailUnknownAccounts must be a boolean when set." -}}
  {{- end -}}
{{- end -}}

{{- if ne .Values.paperless.auth.cookiePrefix nil -}}
  {{- if not (kindIs "string" .Values.paperless.auth.cookiePrefix) -}}
    {{- fail "paperless.auth.cookiePrefix must be a string when set." -}}
  {{- end -}}
{{- end -}}

{{- if ne .Values.paperless.auth.sessionRemember nil -}}
  {{- if not (kindIs "bool" .Values.paperless.auth.sessionRemember) -}}
    {{- fail "paperless.auth.sessionRemember must be a boolean when set." -}}
  {{- end -}}
{{- end -}}

{{- if ne .Values.paperless.auth.sessionCookieAge nil -}}
  {{- if not (or (kindIs "int" .Values.paperless.auth.sessionCookieAge) (kindIs "int64" .Values.paperless.auth.sessionCookieAge) (kindIs "float64" .Values.paperless.auth.sessionCookieAge)) -}}
    {{- fail "paperless.auth.sessionCookieAge must be a number when set." -}}
  {{- end -}}
  {{- if lt (int .Values.paperless.auth.sessionCookieAge) 0 -}}
    {{- fail "paperless.auth.sessionCookieAge must be zero or greater when set." -}}
  {{- end -}}
{{- end -}}

{{- if .Values.paperless.hosting.forceScriptName -}}
  {{- if not (hasPrefix "/" .Values.paperless.hosting.forceScriptName) -}}
    {{- fail "paperless.hosting.forceScriptName must start with \"/\" when set." -}}
  {{- end -}}
  {{- if and (ne .Values.paperless.hosting.forceScriptName "/") (hasSuffix "/" .Values.paperless.hosting.forceScriptName) -}}
    {{- fail "paperless.hosting.forceScriptName must not end with \"/\" unless it is exactly \"/\"." -}}
  {{- end -}}
{{- end -}}

{{- if .Values.paperless.hosting.staticUrl -}}
  {{- if not (hasPrefix "/" .Values.paperless.hosting.staticUrl) -}}
    {{- fail "paperless.hosting.staticUrl must start with \"/\" when set." -}}
  {{- end -}}
  {{- if not (hasSuffix "/" .Values.paperless.hosting.staticUrl) -}}
    {{- fail "paperless.hosting.staticUrl must end with \"/\" when set." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.paperless.branding.logo.existingSecret.name .Values.paperless.branding.logo.existingConfigMap.name -}}
{{- fail "paperless.branding.logo.existingSecret.name and paperless.branding.logo.existingConfigMap.name are mutually exclusive." -}}
{{- end -}}

{{- if and (or .Values.paperless.branding.logo.existingSecret.key .Values.paperless.branding.logo.existingConfigMap.key .Values.paperless.branding.logo.fileName) (not (or .Values.paperless.branding.logo.existingSecret.name .Values.paperless.branding.logo.existingConfigMap.name)) -}}
{{- fail "paperless.branding.logo.fileName and source keys require either paperless.branding.logo.existingSecret.name or paperless.branding.logo.existingConfigMap.name." -}}
{{- end -}}

{{- if .Values.paperless.branding.logo.existingSecret.name -}}
  {{- if empty .Values.paperless.branding.logo.existingSecret.key -}}
    {{- fail "paperless.branding.logo.existingSecret.key must be set when a logo Secret is used." -}}
  {{- end -}}
  {{- if empty .Values.paperless.branding.logo.fileName -}}
    {{- fail "paperless.branding.logo.fileName must be set when a logo Secret is used." -}}
  {{- end -}}
{{- end -}}

{{- if .Values.paperless.branding.logo.existingConfigMap.name -}}
  {{- if empty .Values.paperless.branding.logo.existingConfigMap.key -}}
    {{- fail "paperless.branding.logo.existingConfigMap.key must be set when a logo ConfigMap is used." -}}
  {{- end -}}
  {{- if empty .Values.paperless.branding.logo.fileName -}}
    {{- fail "paperless.branding.logo.fileName must be set when a logo ConfigMap is used." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.paperless.branding.logo.fileName (contains "/" .Values.paperless.branding.logo.fileName) -}}
{{- fail "paperless.branding.logo.fileName must be a file name without path separators." -}}
{{- end -}}

{{- if .Values.paperless.bootstrapAdmin.enabled -}}
  {{- if .Values.paperless.bootstrapAdmin.existingSecret.name -}}
    {{- if or .Values.paperless.bootstrapAdmin.username .Values.paperless.bootstrapAdmin.password .Values.paperless.bootstrapAdmin.email -}}
      {{- fail "paperless.bootstrapAdmin.existingSecret.name cannot be combined with inline bootstrapAdmin.username/password/email values." -}}
    {{- end -}}
    {{- if empty .Values.paperless.bootstrapAdmin.existingSecret.usernameKey -}}
      {{- fail "paperless.bootstrapAdmin.existingSecret.usernameKey must be set when bootstrapAdmin uses an existing Secret." -}}
    {{- end -}}
    {{- if empty .Values.paperless.bootstrapAdmin.existingSecret.passwordKey -}}
      {{- fail "paperless.bootstrapAdmin.existingSecret.passwordKey must be set when bootstrapAdmin uses an existing Secret." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.paperless.bootstrapAdmin.username -}}
      {{- fail "paperless.bootstrapAdmin.username must be set when bootstrapAdmin.enabled=true and no existing Secret is used." -}}
    {{- end -}}
    {{- if empty .Values.paperless.bootstrapAdmin.password -}}
      {{- fail "paperless.bootstrapAdmin.password must be set when bootstrapAdmin.enabled=true and no existing Secret is used. For production, prefer paperless.bootstrapAdmin.existingSecret." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if .Values.paperless.auth.oidc.enabled -}}
  {{- if empty .Values.paperless.auth.oidc.existingSecret.key -}}
    {{- fail "paperless.auth.oidc.existingSecret.key must be set when OIDC is enabled." -}}
  {{- end -}}
  {{- if .Values.paperless.auth.oidc.existingSecret.name -}}
    {{- if or .Values.paperless.auth.oidc.provider.serverUrl .Values.paperless.auth.oidc.provider.clientId .Values.paperless.auth.oidc.provider.clientSecret -}}
      {{- fail "paperless.auth.oidc.existingSecret.name cannot be combined with generated provider fields. Use either paperless.auth.oidc.existingSecret or paperless.auth.oidc.provider.* generation inputs." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.paperless.auth.oidc.provider.providerId -}}
      {{- fail "paperless.auth.oidc.provider.providerId must be set when generating the OIDC provider config." -}}
    {{- end -}}
    {{- if empty .Values.paperless.auth.oidc.provider.name -}}
      {{- fail "paperless.auth.oidc.provider.name must be set when generating the OIDC provider config." -}}
    {{- end -}}
    {{- if empty .Values.paperless.auth.oidc.provider.serverUrl -}}
      {{- fail "paperless.auth.oidc.provider.serverUrl must be set when generating the OIDC provider config." -}}
    {{- end -}}
    {{- if empty .Values.paperless.auth.oidc.provider.clientId -}}
      {{- fail "paperless.auth.oidc.provider.clientId must be set when generating the OIDC provider config." -}}
    {{- end -}}
    {{- if empty .Values.paperless.auth.oidc.provider.clientSecret -}}
      {{- fail "paperless.auth.oidc.provider.clientSecret must be set when generating the OIDC provider config. For production, prefer paperless.auth.oidc.existingSecret." -}}
    {{- end -}}
    {{- if not (has "openid" (.Values.paperless.auth.oidc.provider.scope | default (list))) -}}
      {{- fail "paperless.auth.oidc.provider.scope must include \"openid\" when generating the OIDC provider config." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if not (has .Values.database.type (list "sqlite" "postgresql")) -}}
{{- fail "database.type must be one of: sqlite, postgresql." -}}
{{- end -}}

{{- if and (eq .Values.database.type "sqlite") .Values.database.useCnpgCluster.enabled -}}
{{- fail "database.useCnpgCluster.enabled=true requires database.type=postgresql." -}}
{{- end -}}

{{- if eq .Values.database.type "postgresql" -}}
  {{- if .Values.database.useCnpgCluster.enabled -}}
    {{- if empty .Values.database.useCnpgCluster.clusterName -}}
      {{- fail "database.useCnpgCluster.clusterName must be set when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.database -}}
      {{- fail "database.useCnpgCluster.secretKeys.database is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.username -}}
      {{- fail "database.useCnpgCluster.secretKeys.username is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.password -}}
      {{- fail "database.useCnpgCluster.secretKeys.password is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.sslMode -}}
      {{- fail "database.useCnpgCluster.sslMode must be set when CNPG integration is enabled." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.database.postgres.host -}}
      {{- fail "database.postgres.host must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.database -}}
      {{- fail "database.postgres.database must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.user -}}
      {{- fail "database.postgres.user must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.name -}}
      {{- fail "database.postgres.passwordSecret.name must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.key -}}
      {{- fail "database.postgres.passwordSecret.key must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.sslMode -}}
      {{- fail "database.postgres.sslMode must be set when database.type=postgresql and CNPG is disabled." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.redis.enabled (or .Values.redis.external.url .Values.redis.external.existingSecret.name) -}}
{{- fail "redis.enabled=true cannot be combined with redis.external.url or redis.external.existingSecret.name." -}}
{{- end -}}

{{- if and (not .Values.redis.enabled) (empty .Values.redis.external.url) (empty .Values.redis.external.existingSecret.name) -}}
{{- fail "Paperless requires Redis. Either enable the bundled redis subchart or provide redis.external.url / redis.external.existingSecret." -}}
{{- end -}}

{{- if and .Values.redis.external.existingSecret.name (empty .Values.redis.external.existingSecret.key) -}}
{{- fail "redis.external.existingSecret.key must be set when redis.external.existingSecret.name is provided." -}}
{{- end -}}

{{- range $name, $cfg := .Values.persistence -}}
  {{- if and (not $cfg.enabled) (not (empty $cfg.existingClaim)) -}}
{{- fail (printf "persistence.%s.existingClaim requires persistence.%s.enabled=true." $name $name) -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.securityContext.readOnlyRootFilesystem (not .Values.tmpVolume.enabled) -}}
{{- fail "securityContext.readOnlyRootFilesystem=true requires tmpVolume.enabled=true." -}}
{{- end -}}

{{- if and .Values.securityContext.readOnlyRootFilesystem (not .Values.runVolume.enabled) -}}
{{- fail "securityContext.readOnlyRootFilesystem=true requires runVolume.enabled=true." -}}
{{- end -}}

{{- if and .Values.securityContext.readOnlyRootFilesystem (not .Values.gnupgVolume.enabled) -}}
{{- fail "securityContext.readOnlyRootFilesystem=true requires gnupgVolume.enabled=true." -}}
{{- end -}}

{{- if and .Values.documentConversion.enabled (not (or .Values.gotenberg.enabled .Values.documentConversion.gotenbergEndpoint)) -}}
{{- fail "documentConversion.enabled=true requires gotenberg.enabled=true or documentConversion.gotenbergEndpoint to be set." -}}
{{- end -}}

{{- if and .Values.documentConversion.enabled (not (or .Values.tika.enabled .Values.documentConversion.tikaEndpoint)) -}}
{{- fail "documentConversion.enabled=true requires tika.enabled=true or documentConversion.tikaEndpoint to be set." -}}
{{- end -}}

{{- if and .Values.gotenberg.enabled .Values.gotenberg.securityContext.readOnlyRootFilesystem (not .Values.gotenberg.tmpVolume.enabled) -}}
{{- fail "gotenberg.securityContext.readOnlyRootFilesystem=true requires gotenberg.tmpVolume.enabled=true." -}}
{{- end -}}

{{- if and .Values.tika.enabled .Values.tika.securityContext.readOnlyRootFilesystem (not .Values.tika.tmpVolume.enabled) -}}
{{- fail "tika.securityContext.readOnlyRootFilesystem=true requires tika.tmpVolume.enabled=true." -}}
{{- end -}}
