{{- if not .Values.paperless.secretKey.existingSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "paperless-ngx.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
type: Opaque
data:
{{- $secretName := include "paperless-ngx.secretName" . }}
{{- $secretKeyName := include "paperless-ngx.secretKeyName" . }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
{{- if $existingSecret }}
  {{ $secretKeyName }}: {{ index $existingSecret.data $secretKeyName }}
{{- else }}
  {{ $secretKeyName }}: {{ randAlphaNum 64 | b64enc | quote }}
{{- end }}
{{- end }}
