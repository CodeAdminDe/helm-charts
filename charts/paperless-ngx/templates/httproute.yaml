{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "paperless-ngx.httpRouteName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.gatewayApi.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- range .Values.gatewayApi.parentRefs }}
    - name: {{ .name }}
      {{- with .namespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .sectionName }}
      sectionName: {{ . }}
      {{- end }}
      {{- with .kind }}
      kind: {{ . }}
      {{- end }}
      {{- with .group }}
      group: {{ . }}
      {{- end }}
    {{- end }}
  hostnames:
    {{- range .Values.gatewayApi.hostnames }}
    - {{ . | quote }}
    {{- end }}
  rules:
    - {{- with .Values.gatewayApi.matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gatewayApi.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- if .Values.gatewayApi.backendRefs }}
        {{- toYaml .Values.gatewayApi.backendRefs | nindent 8 }}
        {{- else }}
        - name: {{ include "paperless-ngx.fullname" . }}
          port: {{ .Values.service.port }}
        {{- end }}
{{- end }}
