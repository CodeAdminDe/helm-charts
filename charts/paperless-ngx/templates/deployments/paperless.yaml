{{- $postgresMode := eq .Values.database.type "postgresql" -}}
{{- $cnpgMode := and $postgresMode .Values.database.useCnpgCluster.enabled -}}
{{- $paperlessApps := include "paperless-ngx.paperlessApps" . -}}
{{- $accountDefaultHttpProtocol := include "paperless-ngx.accountDefaultHttpProtocol" . -}}
{{- $bootstrapAdmin := .Values.paperless.bootstrapAdmin -}}
{{- $appLogoPath := include "paperless-ngx.appLogoPath" . -}}
{{- $emailUnknownAccounts := .Values.paperless.auth.emailUnknownAccounts -}}
{{- $cookiePrefix := .Values.paperless.auth.cookiePrefix -}}
{{- $sessionRemember := .Values.paperless.auth.sessionRemember -}}
{{- $sessionCookieAge := .Values.paperless.auth.sessionCookieAge -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless-ngx.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    {{- include "paperless-ngx.componentLabels" (dict "root" . "component" "webserver") | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "paperless-ngx.componentSelectorLabels" (dict "root" . "component" "webserver") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paperless-ngx.componentSelectorLabels" (dict "root" . "component" "webserver") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "paperless-ngx.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- if and .Values.applySecurity .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      containers:
        - name: paperless
          image: {{ include "paperless-ngx.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.targetProtocol }}
          env:
            {{- if .Values.paperlessReadOnlyRootFix }}
            - name: S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES
              value: "1"
            - name: S6_READ_ONLY_ROOT
              value: "1"
            {{- end }}
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.secretName" . }}
                  key: {{ include "paperless-ngx.secretKeyName" . | quote }}
            - name: PAPERLESS_DATA_DIR
              value: {{ .Values.persistence.data.mountPath | quote }}
            - name: PAPERLESS_MEDIA_ROOT
              value: {{ .Values.persistence.media.mountPath | quote }}
            - name: PAPERLESS_CONSUMPTION_DIR
              value: {{ .Values.persistence.consume.mountPath | quote }}
            - name: PAPERLESS_EXPORT_DIR
              value: {{ .Values.persistence.export.mountPath | quote }}
            {{- if include "paperless-ngx.publicUrl" . }}
            - name: PAPERLESS_URL
              value: {{ include "paperless-ngx.publicUrl" . | quote }}
            - name: PAPERLESS_CSRF_TRUSTED_ORIGINS
              value: {{ include "paperless-ngx.publicUrl" . | quote }}
            {{- end }}
            {{- if .Values.paperless.branding.appTitle }}
            - name: PAPERLESS_APP_TITLE
              value: {{ .Values.paperless.branding.appTitle | quote }}
            {{- end }}
            {{- if $appLogoPath }}
            - name: PAPERLESS_APP_LOGO
              value: {{ $appLogoPath | quote }}
            {{- end }}
            {{- if $paperlessApps }}
            - name: PAPERLESS_APPS
              value: {{ $paperlessApps | quote }}
            {{- end }}
            {{- if $bootstrapAdmin.enabled }}
            {{- if $bootstrapAdmin.existingSecret.name }}
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapAdmin.existingSecret.name }}
                  key: {{ $bootstrapAdmin.existingSecret.usernameKey | quote }}
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapAdmin.existingSecret.name }}
                  key: {{ $bootstrapAdmin.existingSecret.passwordKey | quote }}
            {{- if $bootstrapAdmin.existingSecret.emailKey }}
            - name: PAPERLESS_ADMIN_MAIL
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapAdmin.existingSecret.name }}
                  key: {{ $bootstrapAdmin.existingSecret.emailKey | quote }}
            {{- end }}
            {{- else }}
            - name: PAPERLESS_ADMIN_USER
              value: {{ $bootstrapAdmin.username | quote }}
            - name: PAPERLESS_ADMIN_PASSWORD
              value: {{ $bootstrapAdmin.password | quote }}
            {{- if $bootstrapAdmin.email }}
            - name: PAPERLESS_ADMIN_MAIL
              value: {{ $bootstrapAdmin.email | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            - name: PAPERLESS_ACCOUNT_ALLOW_SIGNUPS
              value: {{ ternary "true" "false" .Values.paperless.auth.allowSignups | quote }}
            {{- with .Values.paperless.auth.defaultGroups }}
            - name: PAPERLESS_ACCOUNT_DEFAULT_GROUPS
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if $accountDefaultHttpProtocol }}
            - name: PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL
              value: {{ $accountDefaultHttpProtocol | quote }}
            {{- end }}
            {{- if .Values.paperless.auth.emailVerification }}
            - name: PAPERLESS_ACCOUNT_EMAIL_VERIFICATION
              value: {{ .Values.paperless.auth.emailVerification | quote }}
            {{- end }}
            {{- if ne $emailUnknownAccounts nil }}
            {{- if not (kindIs "bool" $emailUnknownAccounts) }}
            {{- fail "paperless.auth.emailUnknownAccounts must be a boolean when set." }}
            {{- end }}
            - name: PAPERLESS_ACCOUNT_EMAIL_UNKNOWN_ACCOUNTS
              value: {{ ternary "true" "false" $emailUnknownAccounts | quote }}
            {{- end }}
            {{- if ne $cookiePrefix nil }}
            {{- if not (kindIs "string" $cookiePrefix) }}
            {{- fail "paperless.auth.cookiePrefix must be a string when set." }}
            {{- end }}
            {{- if $cookiePrefix }}
            - name: PAPERLESS_COOKIE_PREFIX
              value: {{ $cookiePrefix | quote }}
            {{- end }}
            {{- end }}
            {{- if ne $sessionRemember nil }}
            {{- if not (kindIs "bool" $sessionRemember) }}
            {{- fail "paperless.auth.sessionRemember must be a boolean when set." }}
            {{- end }}
            - name: PAPERLESS_ACCOUNT_SESSION_REMEMBER
              value: {{ ternary "true" "false" $sessionRemember | quote }}
            {{- end }}
            {{- if ne $sessionCookieAge nil }}
            {{- if not (kindIs "string" $sessionCookieAge) }}
            {{- fail "paperless.auth.sessionCookieAge must be a string when set. Quote numeric values such as \"1209600\"." }}
            {{- end }}
            {{- if $sessionCookieAge }}
            - name: PAPERLESS_SESSION_COOKIE_AGE
              value: {{ $sessionCookieAge | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.paperless.auth.oidc.enabled }}
            - name: PAPERLESS_SOCIALACCOUNT_PROVIDERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.oidcSecretName" . }}
                  key: {{ include "paperless-ngx.oidcSecretKeyName" . | quote }}
            - name: PAPERLESS_SOCIAL_AUTO_SIGNUP
              value: {{ ternary "true" "false" .Values.paperless.auth.oidc.socialAutoSignup | quote }}
            - name: PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS
              value: {{ ternary "true" "false" .Values.paperless.auth.oidc.allowSignups | quote }}
            - name: PAPERLESS_SOCIAL_ACCOUNT_SYNC_GROUPS
              value: {{ ternary "true" "false" .Values.paperless.auth.oidc.syncGroups | quote }}
            {{- with .Values.paperless.auth.oidc.defaultGroups }}
            - name: PAPERLESS_SOCIAL_ACCOUNT_DEFAULT_GROUPS
              value: {{ join "," . | quote }}
            {{- end }}
            - name: PAPERLESS_DISABLE_REGULAR_LOGIN
              value: {{ ternary "true" "false" .Values.paperless.auth.oidc.disableRegularLogin | quote }}
            - name: PAPERLESS_REDIRECT_LOGIN_TO_SSO
              value: {{ ternary "true" "false" .Values.paperless.auth.oidc.redirectLoginToSso | quote }}
            {{- end }}
            {{- if .Values.paperless.timeZone }}
            - name: PAPERLESS_TIME_ZONE
              value: {{ .Values.paperless.timeZone | quote }}
            {{- end }}
            - name: PAPERLESS_OCR_LANGUAGE
              value: {{ .Values.paperless.ocrLanguage | quote }}
            {{- if .Values.paperless.ocrLanguages }}
            - name: PAPERLESS_OCR_LANGUAGES
              value: {{ .Values.paperless.ocrLanguages | quote }}
            {{- end }}
            {{- with .Values.paperless.hosting.trustedProxies }}
            - name: PAPERLESS_TRUSTED_PROXIES
              value: {{ join "," . | quote }}
            {{- end }}
            {{- if .Values.paperless.hosting.forceScriptName }}
            - name: PAPERLESS_FORCE_SCRIPT_NAME
              value: {{ .Values.paperless.hosting.forceScriptName | quote }}
            {{- end }}
            {{- if .Values.paperless.hosting.staticUrl }}
            - name: PAPERLESS_STATIC_URL
              value: {{ .Values.paperless.hosting.staticUrl | quote }}
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: PAPERLESS_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.redisSecretName" . }}
                  key: REDIS_PASSWORD
            - name: PAPERLESS_REDIS
              value: {{ printf "redis://:$(PAPERLESS_REDIS_PASSWORD)@%s:6379/0" (include "paperless-ngx.redisServiceName" .) | quote }}
            {{- else if .Values.redis.external.existingSecret.name }}
            - name: PAPERLESS_REDIS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.existingSecret.name }}
                  key: {{ .Values.redis.external.existingSecret.key | quote }}
            {{- else if .Values.redis.external.url }}
            - name: PAPERLESS_REDIS
              value: {{ .Values.redis.external.url | quote }}
            {{- end }}
            {{- if $postgresMode }}
            - name: PAPERLESS_DBENGINE
              value: postgresql
            {{- if $cnpgMode }}
            - name: PAPERLESS_DBHOST
              value: {{ printf "%s-rw" .Values.database.useCnpgCluster.clusterName | quote }}
            - name: PAPERLESS_DBPORT
              value: {{ printf "%v" .Values.database.useCnpgCluster.port | quote }}
            - name: PAPERLESS_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.database | quote }}
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.username | quote }}
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "paperless-ngx.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.password | quote }}
            - name: PAPERLESS_DBSSLMODE
              value: {{ .Values.database.useCnpgCluster.sslMode | quote }}
            {{- else }}
            - name: PAPERLESS_DBHOST
              value: {{ .Values.database.postgres.host | quote }}
            - name: PAPERLESS_DBPORT
              value: {{ printf "%v" .Values.database.postgres.port | quote }}
            - name: PAPERLESS_DBNAME
              value: {{ .Values.database.postgres.database | quote }}
            - name: PAPERLESS_DBUSER
              value: {{ .Values.database.postgres.user | quote }}
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.passwordSecret.name }}
                  key: {{ .Values.database.postgres.passwordSecret.key | quote }}
            - name: PAPERLESS_DBSSLMODE
              value: {{ .Values.database.postgres.sslMode | quote }}
            {{- end }}
            {{- else }}
            - name: PAPERLESS_DBENGINE
              value: sqlite
            {{- end }}
            {{- if .Values.documentConversion.enabled }}
            - name: PAPERLESS_TIKA_ENABLED
              value: "1"
            - name: PAPERLESS_TIKA_GOTENBERG_ENDPOINT
              value: {{ include "paperless-ngx.gotenbergEndpoint" . | quote }}
            - name: PAPERLESS_TIKA_ENDPOINT
              value: {{ include "paperless-ngx.tikaEndpoint" . | quote }}
            {{- end }}
            {{- range $key := (keys .Values.extraEnv | sortAlpha) }}
            - name: {{ $key }}
              value: {{ index $.Values.extraEnv $key | quote }}
            {{- end }}
            {{- if kindIs "map" .Values.additionalEnvSecrets }}
            {{- range $envName := (keys .Values.additionalEnvSecrets | sortAlpha) }}
            {{- $secretConfig := index $.Values.additionalEnvSecrets $envName }}
            {{- if kindIs "string" $secretConfig }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretConfig }}
                  key: {{ $envName | quote }}
            {{- else if kindIs "map" $secretConfig }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- if $secretName }}
            - name: {{ default $envName (index $secretConfig "name") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- else if kindIs "slice" .Values.additionalEnvSecrets }}
            {{- range $secretConfig := .Values.additionalEnvSecrets }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- $envName := (default "" (index $secretConfig "name")) }}
            {{- if and $secretName $envName }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- if and .Values.applySecurity .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.applyHealthChecks }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.data.mountPath }}
            - name: media
              mountPath: {{ .Values.persistence.media.mountPath }}
            - name: consume
              mountPath: {{ .Values.persistence.consume.mountPath }}
            - name: export
              mountPath: {{ .Values.persistence.export.mountPath }}
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
            {{- end }}
            {{- if .Values.runVolume.enabled }}
            - name: run
              mountPath: {{ .Values.runVolume.mountPath }}
            {{- end }}
            {{- if .Values.gnupgVolume.enabled }}
            - name: gnupg
              mountPath: {{ .Values.gnupgVolume.mountPath }}
            {{- end }}
            {{- if $appLogoPath }}
            - name: app-logo
              mountPath: {{ include "paperless-ngx.logoMountPath" . }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.data.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.persistenceClaimName" (dict "root" . "name" "data") }}
          {{- else }}
          emptyDir:
            {{- with .Values.persistence.data.emptyDirSizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- end }}
        - name: media
          {{- if .Values.persistence.media.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.persistenceClaimName" (dict "root" . "name" "media") }}
          {{- else }}
          emptyDir:
            {{- with .Values.persistence.media.emptyDirSizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- end }}
        - name: consume
          {{- if .Values.persistence.consume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.persistenceClaimName" (dict "root" . "name" "consume") }}
          {{- else }}
          emptyDir:
            {{- with .Values.persistence.consume.emptyDirSizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- end }}
        - name: export
          {{- if .Values.persistence.export.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.persistenceClaimName" (dict "root" . "name" "export") }}
          {{- else }}
          emptyDir:
            {{- with .Values.persistence.export.emptyDirSizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
          {{- end }}
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir:
            {{- with .Values.tmpVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- if .Values.runVolume.enabled }}
        - name: run
          emptyDir:
            {{- with .Values.runVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- if .Values.gnupgVolume.enabled }}
        - name: gnupg
          emptyDir:
            {{- with .Values.gnupgVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- if $appLogoPath }}
        - name: app-logo
          {{- if .Values.paperless.branding.logo.existingSecret.name }}
          secret:
            secretName: {{ .Values.paperless.branding.logo.existingSecret.name }}
            items:
              - key: {{ .Values.paperless.branding.logo.existingSecret.key | quote }}
                path: {{ .Values.paperless.branding.logo.fileName | quote }}
          {{- else }}
          configMap:
            name: {{ .Values.paperless.branding.logo.existingConfigMap.name }}
            items:
              - key: {{ .Values.paperless.branding.logo.existingConfigMap.key | quote }}
                path: {{ .Values.paperless.branding.logo.fileName | quote }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
