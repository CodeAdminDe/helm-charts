{{- if and .Values.persistence.media.enabled (not .Values.persistence.media.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "paperless-ngx.persistenceClaimName" (dict "root" . "name" "media") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    {{- include "paperless-ngx.componentLabels" (dict "root" . "component" "webserver") | nindent 4 }}
  {{- if or .Values.persistence.media.retain .Values.persistence.media.annotations }}
  annotations:
    {{- if .Values.persistence.media.retain }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- with .Values.persistence.media.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.media.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.media.size }}
  {{- with .Values.persistence.media.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  {{- with .Values.persistence.media.volumeName }}
  volumeName: {{ . }}
  {{- end }}
{{- end }}
