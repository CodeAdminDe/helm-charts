{{- if .Values.securitySecrets.create -}}
{{- $secretName := include "documenso.securitySecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $nextAuthKey := .Values.securitySecrets.keys.nextAuthSecret -}}
{{- $encryptionKey := .Values.securitySecrets.keys.encryptionKey -}}
{{- $secondaryKey := .Values.securitySecrets.keys.encryptionSecondaryKey -}}
{{- $nextAuthValue := randAlphaNum 48 -}}
{{- $encryptionValue := randAlphaNum 64 -}}
{{- $secondaryValue := randAlphaNum 64 -}}
{{- if and $existing $existing.data -}}
  {{- if hasKey $existing.data $nextAuthKey -}}
    {{- $nextAuthValue = index $existing.data $nextAuthKey | b64dec -}}
  {{- end -}}
  {{- if hasKey $existing.data $encryptionKey -}}
    {{- $encryptionValue = index $existing.data $encryptionKey | b64dec -}}
  {{- end -}}
  {{- if hasKey $existing.data $secondaryKey -}}
    {{- $secondaryValue = index $existing.data $secondaryKey | b64dec -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "documenso.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $nextAuthKey }}: {{ $nextAuthValue | quote }}
  {{ $encryptionKey }}: {{ $encryptionValue | quote }}
  {{ $secondaryKey }}: {{ $secondaryValue | quote }}
{{- end }}
