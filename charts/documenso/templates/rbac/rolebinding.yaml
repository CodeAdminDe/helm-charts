{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "documenso.rbacRoleName" . }}
  namespace: {{ include "documenso.rbacNamespace" . }}
  labels:
    {{- include "documenso.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "documenso.rbacRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "documenso.serviceAccountName" . }}
    # The ServiceAccount always lives in the release namespace; only the Role/RoleBinding namespace is overridable via rbac.namespace.
    namespace: {{ .Release.Namespace }}
{{- end }}
