{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/route resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
  {{- if not (has .Values.gatewayApi.scheme (list "http" "https")) -}}
    {{- fail "gatewayApi.scheme must be either \"http\" or \"https\" when gatewayApi.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.libchartCnps.enabled (not .Values.gatewayApi.controllerSelector) (not .Values.cnps.appTraffic.ingress.fromEndpoints) (not .Values.cnps.appTraffic.ingress.fromEntities) -}}
    {{- fail "gatewayApi.enabled=true and libchartCnps.enabled=true requires either gatewayApi.controllerSelector or explicit cnps.appTraffic.ingress.fromEndpoints/fromEntities to generate valid ingress policies." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.database.useCnpgCluster.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires database.useCnpgCluster.enabled=true." -}}
{{- end -}}

{{- if and .Values.securitySecrets.create (not (empty .Values.securitySecrets.existingSecret)) -}}
{{- fail "securitySecrets.create=true cannot be combined with securitySecrets.existingSecret." -}}
{{- end -}}

{{- if and (not .Values.securitySecrets.create) (empty .Values.securitySecrets.existingSecret) -}}
{{- fail "securitySecrets.existingSecret must be set when securitySecrets.create=false." -}}
{{- end -}}

{{- if empty .Values.securitySecrets.keys.nextAuthSecret -}}
{{- fail "securitySecrets.keys.nextAuthSecret must be set." -}}
{{- end -}}

{{- if empty .Values.securitySecrets.keys.encryptionKey -}}
{{- fail "securitySecrets.keys.encryptionKey must be set." -}}
{{- end -}}

{{- if empty .Values.securitySecrets.keys.encryptionSecondaryKey -}}
{{- fail "securitySecrets.keys.encryptionSecondaryKey must be set." -}}
{{- end -}}

{{- if empty .Values.smtp.host -}}
{{- fail "smtp.host must be set." -}}
{{- end -}}

{{- if empty .Values.smtp.fromAddress -}}
{{- fail "smtp.fromAddress must be set." -}}
{{- end -}}

{{- if empty .Values.smtp.credentialsSecret.name -}}
{{- fail "smtp.credentialsSecret.name must be set." -}}
{{- end -}}

{{- if empty .Values.smtp.credentialsSecret.usernameKey -}}
{{- fail "smtp.credentialsSecret.usernameKey must be set." -}}
{{- end -}}

{{- if empty .Values.smtp.credentialsSecret.passwordKey -}}
{{- fail "smtp.credentialsSecret.passwordKey must be set." -}}
{{- end -}}

{{- if .Values.database.useCnpgCluster.enabled -}}
  {{- if empty .Values.database.useCnpgCluster.clusterName -}}
    {{- fail "database.useCnpgCluster.clusterName must be set when CNPG integration is enabled." -}}
  {{- end -}}
  {{- if empty .Values.database.useCnpgCluster.secretKeys.connectionString -}}
    {{- fail "database.useCnpgCluster.secretKeys.connectionString is required when CNPG integration is enabled." -}}
  {{- end -}}
{{- else -}}
  {{- if empty .Values.database.externalSecret.name -}}
    {{- fail "database.externalSecret.name must be set when CNPG integration is disabled." -}}
  {{- end -}}
  {{- if empty .Values.database.externalSecret.urlKey -}}
    {{- fail "database.externalSecret.urlKey must be set when CNPG integration is disabled." -}}
  {{- end -}}
{{- end -}}

{{- if not (has .Values.storage.transport (list "database" "s3")) -}}
{{- fail "storage.transport must be one of: database, s3." -}}
{{- end -}}

{{- if eq .Values.storage.transport "s3" -}}
  {{- if empty .Values.storage.s3.endpoint -}}
    {{- fail "storage.s3.endpoint must be set when storage.transport=s3." -}}
  {{- end -}}
  {{- if empty .Values.storage.s3.region -}}
    {{- fail "storage.s3.region must be set when storage.transport=s3." -}}
  {{- end -}}
  {{- if empty .Values.storage.s3.bucket -}}
    {{- fail "storage.s3.bucket must be set when storage.transport=s3." -}}
  {{- end -}}
  {{- if empty .Values.storage.s3.credentialsSecret.name -}}
    {{- fail "storage.s3.credentialsSecret.name must be set when storage.transport=s3." -}}
  {{- end -}}
  {{- if empty .Values.storage.s3.credentialsSecret.accessKeyIdKey -}}
    {{- fail "storage.s3.credentialsSecret.accessKeyIdKey must be set when storage.transport=s3." -}}
  {{- end -}}
  {{- if empty .Values.storage.s3.credentialsSecret.secretAccessKeyKey -}}
    {{- fail "storage.s3.credentialsSecret.secretAccessKeyKey must be set when storage.transport=s3." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.signing.certificateSecret.name (empty .Values.signing.certificateSecret.key) -}}
{{- fail "signing.certificateSecret.key must be set when signing.certificateSecret.name is provided." -}}
{{- end -}}

{{- if and .Values.signing.passphraseSecret.name (empty .Values.signing.passphraseSecret.key) -}}
{{- fail "signing.passphraseSecret.key must be set when signing.passphraseSecret.name is provided." -}}
{{- end -}}

{{- if and .Values.applySecurity .Values.securityContext.readOnlyRootFilesystem (not .Values.tmpVolume.enabled) -}}
{{- fail "securityContext.readOnlyRootFilesystem=true requires tmpVolume.enabled=true." -}}
{{- end -}}

{{- $reservedEnv := list
  "PORT"
  "NEXTAUTH_SECRET"
  "NEXT_PRIVATE_ENCRYPTION_KEY"
  "NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY"
  "NEXT_PUBLIC_WEBAPP_URL"
  "NEXT_PRIVATE_INTERNAL_WEBAPP_URL"
  "NEXT_PRIVATE_DATABASE_URL"
  "NEXT_PRIVATE_DIRECT_DATABASE_URL"
  "NEXT_PRIVATE_SMTP_TRANSPORT"
  "NEXT_PRIVATE_SMTP_HOST"
  "NEXT_PRIVATE_SMTP_PORT"
  "NEXT_PRIVATE_SMTP_FROM_NAME"
  "NEXT_PRIVATE_SMTP_FROM_ADDRESS"
  "NEXT_PRIVATE_SMTP_SECURE"
  "NEXT_PRIVATE_SMTP_USERNAME"
  "NEXT_PRIVATE_SMTP_PASSWORD"
  "NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH"
  "NEXT_PRIVATE_SIGNING_PASSPHRASE"
  "NEXT_PUBLIC_UPLOAD_TRANSPORT"
  "NEXT_PRIVATE_UPLOAD_ENDPOINT"
  "NEXT_PRIVATE_UPLOAD_REGION"
  "NEXT_PRIVATE_UPLOAD_BUCKET"
  "NEXT_PRIVATE_UPLOAD_ACCESS_KEY_ID"
  "NEXT_PRIVATE_UPLOAD_SECRET_ACCESS_KEY"
  "NEXT_PUBLIC_DISABLE_SIGNUP"
-}}

{{- range $name, $_ := .Values.extraEnv -}}
  {{- if has $name $reservedEnv -}}
    {{- fail (printf "extraEnv[%s] would override a chart-managed Documenso environment variable." $name) -}}
  {{- end -}}
{{- end -}}

{{- if kindIs "slice" .Values.additionalEnvSecrets -}}
  {{- range $entry := .Values.additionalEnvSecrets -}}
    {{- if not (kindIs "map" $entry) -}}
      {{- fail "additionalEnvSecrets list entries must be objects (maps)." -}}
    {{- end -}}
    {{- $name := default "" (index $entry "name") -}}
    {{- $secretName := default "" (index $entry "secretName") -}}
    {{- if or (empty $name) (empty $secretName) -}}
      {{- fail "additionalEnvSecrets list entries must include name and secretName." -}}
    {{- end -}}
    {{- if has $name $reservedEnv -}}
      {{- fail (printf "additionalEnvSecrets entry %s would override a chart-managed Documenso environment variable." $name) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if kindIs "map" .Values.additionalEnvSecrets -}}
  {{- range $envName, $secretConfig := .Values.additionalEnvSecrets -}}
    {{- if has $envName $reservedEnv -}}
      {{- fail (printf "additionalEnvSecrets[%s] would override a chart-managed Documenso environment variable." $envName) -}}
    {{- end -}}
    {{- if kindIs "string" $secretConfig -}}
      {{- if empty $secretConfig -}}
        {{- fail (printf "additionalEnvSecrets[%s] must reference a non-empty secret name." $envName) -}}
      {{- end -}}
    {{- else if kindIs "map" $secretConfig -}}
      {{- $name := default $envName (index $secretConfig "name") -}}
      {{- $secretName := default "" (index $secretConfig "secretName") -}}
      {{- if or (empty $name) (empty $secretName) -}}
        {{- fail (printf "additionalEnvSecrets[%s] map-form entries must resolve to a valid name and secretName." $envName) -}}
      {{- end -}}
      {{- if has $name $reservedEnv -}}
        {{- fail (printf "additionalEnvSecrets[%s] map-form entry would override a chart-managed Documenso environment variable." $envName) -}}
      {{- end -}}
    {{- else -}}
      {{- fail (printf "additionalEnvSecrets[%s] must be either a secret name string or an object." $envName) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and (not (kindIs "map" .Values.additionalEnvSecrets)) (not (kindIs "slice" .Values.additionalEnvSecrets)) (not (empty .Values.additionalEnvSecrets)) -}}
{{- fail "additionalEnvSecrets must be either a map or a list." -}}
{{- end -}}
