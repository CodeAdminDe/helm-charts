{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "documenso.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "documenso.labels" . | nindent 4 }}
    {{- include "documenso.componentLabels" (dict "component" "webserver") | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "documenso.componentSelectorLabels" (dict "root" . "component" "webserver") | nindent 6 }}
{{- end }}
