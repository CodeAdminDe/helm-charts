{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress or HTTPRoute resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
  {{- if not (has .Values.gatewayApi.scheme (list "http" "https")) -}}
    {{- fail "gatewayApi.scheme must be either \"http\" or \"https\" when gatewayApi.enabled=true." -}}
  {{- end -}}
  {{- if and .Values.libchartCnps.enabled (not .Values.gatewayApi.controllerSelector) (not .Values.cnps.appTraffic.ingress.fromEndpoints) (not .Values.cnps.appTraffic.ingress.fromEntities) -}}
    {{- fail "gatewayApi.enabled=true and libchartCnps.enabled=true requires either gatewayApi.controllerSelector or explicit cnps.appTraffic.ingress.fromEndpoints/fromEntities to generate valid ingress policies." -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.coder.accessUrl (not (or (hasPrefix "http://" .Values.coder.accessUrl) (hasPrefix "https://" .Values.coder.accessUrl))) -}}
{{- fail "coder.accessUrl must start with http:// or https:// when set." -}}
{{- end -}}

{{- range $path := list "coder.wildcardAccessUrl" "ingress.wildcardHost" "gatewayApi.wildcardHostname" -}}
  {{- $value := "" -}}
  {{- if eq $path "coder.wildcardAccessUrl" -}}
    {{- $value = $.Values.coder.wildcardAccessUrl -}}
  {{- else if eq $path "ingress.wildcardHost" -}}
    {{- $value = $.Values.ingress.wildcardHost -}}
  {{- else if eq $path "gatewayApi.wildcardHostname" -}}
    {{- $value = $.Values.gatewayApi.wildcardHostname -}}
  {{- end -}}
  {{- if $value -}}
    {{- if contains "://" $value -}}
      {{- fail (printf "%s must be a bare wildcard host without scheme, for example *.coder.example.com." $path) -}}
    {{- end -}}
    {{- if contains "/" $value -}}
      {{- fail (printf "%s must not contain a path." $path) -}}
    {{- end -}}
    {{- if not (hasPrefix "*." $value) -}}
      {{- fail (printf "%s must start with \"*.\" when set." $path) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.automountServiceAccountToken) -}}
{{- fail "rbac.create=true requires serviceAccount.automountServiceAccountToken=true so Coder can reach the Kubernetes API." -}}
{{- end -}}

{{- if and .Values.rbac.enableDeployments (not .Values.rbac.workspacePerms) -}}
{{- fail "rbac.enableDeployments=true requires rbac.workspacePerms=true." -}}
{{- end -}}

{{- if and (not (kindIs "slice" .Values.rbac.extraRules)) (not (empty .Values.rbac.extraRules)) -}}
{{- fail "rbac.extraRules must be a list when set." -}}
{{- end -}}

{{- range $idx, $entry := (.Values.rbac.workspaceNamespaces | default (list)) -}}
  {{- if kindIs "map" $entry -}}
    {{- if empty (index $entry "name") -}}
      {{- fail (printf "rbac.workspaceNamespaces[%d].name must be set for object-form entries." $idx) -}}
    {{- end -}}
    {{- if and (hasKey $entry "enableDeployments") (index $entry "enableDeployments") (hasKey $entry "workspacePerms") (not (index $entry "workspacePerms")) -}}
      {{- fail (printf "rbac.workspaceNamespaces[%d].enableDeployments=true requires workspacePerms=true." $idx) -}}
    {{- end -}}
    {{- if and (hasKey $entry "extraRules") (not (kindIs "slice" (index $entry "extraRules"))) (not (empty (index $entry "extraRules"))) -}}
      {{- fail (printf "rbac.workspaceNamespaces[%d].extraRules must be a list when set." $idx) -}}
    {{- end -}}
  {{- else if not (kindIs "string" $entry) -}}
    {{- fail (printf "rbac.workspaceNamespaces[%d] must be either a namespace string or an object." $idx) -}}
  {{- end -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.database.useCnpgCluster.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires database.useCnpgCluster.enabled=true." -}}
{{- end -}}

{{- if and .Values.applySecurity .Values.securityContext.readOnlyRootFilesystem (not .Values.tmpVolume.enabled) -}}
{{- fail "securityContext.readOnlyRootFilesystem=true requires tmpVolume.enabled=true so Coder can write its cache directory." -}}
{{- end -}}

{{- if and .Values.coder.provisionerDaemon.pskSecret.name (empty .Values.coder.provisionerDaemon.pskSecret.key) -}}
{{- fail "coder.provisionerDaemon.pskSecret.key must be set when coder.provisionerDaemon.pskSecret.name is provided." -}}
{{- end -}}

{{- if .Values.database.useCnpgCluster.enabled -}}
  {{- if empty .Values.database.useCnpgCluster.clusterName -}}
    {{- fail "database.useCnpgCluster.clusterName must be set when CNPG integration is enabled." -}}
  {{- end -}}
  {{- if empty .Values.database.useCnpgCluster.secretKeys.connectionString -}}
    {{- fail "database.useCnpgCluster.secretKeys.connectionString is required when CNPG integration is enabled." -}}
  {{- end -}}
{{- else -}}
  {{- if empty .Values.database.externalSecret.name -}}
    {{- fail "database.externalSecret.name must be set when CNPG integration is disabled." -}}
  {{- end -}}
  {{- if empty .Values.database.externalSecret.urlKey -}}
    {{- fail "database.externalSecret.urlKey must be set when CNPG integration is disabled." -}}
  {{- end -}}
{{- end -}}

{{- $reservedEnv := list
  "CODER_HTTP_ADDRESS"
  "CODER_ACCESS_URL"
  "CODER_WILDCARD_ACCESS_URL"
  "CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE"
  "CODER_TELEMETRY_ENABLE"
  "CODER_PROMETHEUS_ENABLE"
  "CODER_PROMETHEUS_ADDRESS"
  "CODER_PPROF_ENABLE"
  "CODER_PPROF_ADDRESS"
  "KUBE_POD_IP"
  "CODER_DERP_SERVER_RELAY_URL"
  "CODER_CACHE_DIRECTORY"
  "CODER_PG_CONNECTION_URL"
  "CODER_PROVISIONER_DAEMON_PSK"
-}}

{{- range $name, $_ := .Values.extraEnv -}}
  {{- if has $name $reservedEnv -}}
    {{- fail (printf "extraEnv[%s] would override a chart-managed Coder environment variable." $name) -}}
  {{- end -}}
{{- end -}}

{{- if kindIs "slice" .Values.additionalEnvSecrets -}}
  {{- range $entry := .Values.additionalEnvSecrets -}}
    {{- if not (kindIs "map" $entry) -}}
      {{- fail "additionalEnvSecrets list entries must be objects (maps)." -}}
    {{- end -}}
    {{- $name := default "" (index $entry "name") -}}
    {{- $secretName := default "" (index $entry "secretName") -}}
    {{- if or (empty $name) (empty $secretName) -}}
      {{- fail "additionalEnvSecrets list entries must include name and secretName." -}}
    {{- end -}}
    {{- if has $name $reservedEnv -}}
      {{- fail (printf "additionalEnvSecrets entry %s would override a chart-managed Coder environment variable." $name) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if kindIs "map" .Values.additionalEnvSecrets -}}
  {{- range $envName, $secretConfig := .Values.additionalEnvSecrets -}}
    {{- if has $envName $reservedEnv -}}
      {{- fail (printf "additionalEnvSecrets[%s] would override a chart-managed Coder environment variable." $envName) -}}
    {{- end -}}
    {{- if kindIs "string" $secretConfig -}}
      {{- if empty $secretConfig -}}
        {{- fail (printf "additionalEnvSecrets[%s] must reference a non-empty secret name." $envName) -}}
      {{- end -}}
    {{- else if kindIs "map" $secretConfig -}}
      {{- $name := default $envName (index $secretConfig "name") -}}
      {{- $secretName := default "" (index $secretConfig "secretName") -}}
      {{- if or (empty $name) (empty $secretName) -}}
        {{- fail (printf "additionalEnvSecrets[%s] map-form entries must resolve to a valid name and secretName." $envName) -}}
      {{- end -}}
      {{- if has $name $reservedEnv -}}
        {{- fail (printf "additionalEnvSecrets[%s] map-form entry would override a chart-managed Coder environment variable." $envName) -}}
      {{- end -}}
    {{- else -}}
      {{- fail (printf "additionalEnvSecrets[%s] must be either a secret name string or an object." $envName) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}

{{- if and (not (kindIs "map" .Values.additionalEnvSecrets)) (not (kindIs "slice" .Values.additionalEnvSecrets)) (not (empty .Values.additionalEnvSecrets)) -}}
{{- fail "additionalEnvSecrets must be either a map or a list." -}}
{{- end -}}
