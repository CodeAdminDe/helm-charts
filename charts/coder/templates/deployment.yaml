{{- $cnpgMode := .Values.database.useCnpgCluster.enabled -}}
{{- $accessUrl := include "coder.publicUrl" . -}}
{{- $wildcardAccessUrl := include "coder.wildcardAccessHost" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coder.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "coder.labels" . | nindent 4 }}
    {{- include "coder.componentLabels" (dict "component" "coderd") | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "coder.componentSelectorLabels" (dict "root" . "component" "coderd") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coder.componentSelectorLabels" (dict "root" . "component" "coderd") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "coder.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if and .Values.applySecurity .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- with .Values.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "coder.name" . }}
          image: {{ include "coder.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.targetProtocol }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          env:
            - name: CODER_HTTP_ADDRESS
              value: {{ printf "0.0.0.0:%v" .Values.service.targetPort | quote }}
            - name: CODER_ACCESS_URL
              value: {{ $accessUrl | quote }}
            - name: CODER_OAUTH2_GITHUB_DEFAULT_PROVIDER_ENABLE
              value: {{ ternary "true" "false" .Values.coder.oauth2.githubDefaultProviderEnabled | quote }}
            - name: CODER_TELEMETRY_ENABLE
              value: {{ ternary "true" "false" .Values.coder.telemetry.enabled | quote }}
            - name: CODER_PROMETHEUS_ENABLE
              value: {{ ternary "true" "false" .Values.coder.prometheus.enabled | quote }}
            {{- if or .Values.coder.prometheus.enabled .Values.coder.prometheus.address }}
            - name: CODER_PROMETHEUS_ADDRESS
              value: {{ default "0.0.0.0:2112" .Values.coder.prometheus.address | quote }}
            {{- end }}
            - name: CODER_PPROF_ENABLE
              value: {{ ternary "true" "false" .Values.coder.pprof.enabled | quote }}
            {{- if or .Values.coder.pprof.enabled .Values.coder.pprof.address }}
            - name: CODER_PPROF_ADDRESS
              value: {{ default "0.0.0.0:6060" .Values.coder.pprof.address | quote }}
            {{- end }}
            - name: KUBE_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CODER_DERP_SERVER_RELAY_URL
              value: {{ printf "http://$(KUBE_POD_IP):%v" .Values.service.targetPort | quote }}
            {{- if .Values.tmpVolume.enabled }}
            - name: CODER_CACHE_DIRECTORY
              value: {{ printf "%s/.cache" .Values.tmpVolume.mountPath | quote }}
            {{- end }}
            {{- if $wildcardAccessUrl }}
            - name: CODER_WILDCARD_ACCESS_URL
              value: {{ $wildcardAccessUrl | quote }}
            {{- end }}
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  {{- if $cnpgMode }}
                  name: {{ include "coder.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.connectionString | quote }}
                  {{- else }}
                  name: {{ .Values.database.externalSecret.name }}
                  key: {{ .Values.database.externalSecret.urlKey | quote }}
                  {{- end }}
            {{- if .Values.coder.provisionerDaemon.pskSecret.name }}
            - name: CODER_PROVISIONER_DAEMON_PSK
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coder.provisionerDaemon.pskSecret.name }}
                  key: {{ .Values.coder.provisionerDaemon.pskSecret.key | quote }}
            {{- end }}
            {{- $extraEnvKeys := keys .Values.extraEnv | sortAlpha }}
            {{- range $key := $extraEnvKeys }}
            - name: {{ $key }}
              value: {{ index $.Values.extraEnv $key | quote }}
            {{- end }}
            {{- if kindIs "map" .Values.additionalEnvSecrets }}
            {{- range $envName := keys .Values.additionalEnvSecrets | sortAlpha }}
            {{- $secretConfig := index $.Values.additionalEnvSecrets $envName }}
            {{- if kindIs "string" $secretConfig }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretConfig }}
                  key: {{ $envName | quote }}
            {{- else if kindIs "map" $secretConfig }}
            {{- $secretName := default "" (index $secretConfig "secretName") }}
            {{- if $secretName }}
            - name: {{ default $envName (index $secretConfig "name") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- else if kindIs "slice" .Values.additionalEnvSecrets }}
            {{- range $secretConfig := .Values.additionalEnvSecrets }}
            {{- $envName := default "" (index $secretConfig "name") }}
            {{- $secretName := default "" (index $secretConfig "secretName") }}
            {{- if and $envName $secretName }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if and .Values.applySecurity .Values.securityContext }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- end }}
          {{- if .Values.applyHealthChecks }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir:
            {{- with .Values.tmpVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
