{{- if .Values.rbac.create }}
{{- $namespaceConfigs := include "coder.rbacNamespaceConfigs" . | fromJson -}}
{{- range $ns := (keys $namespaceConfigs | sortAlpha) }}
{{- $cfg := index $namespaceConfigs $ns -}}
{{- $extraRules := default (list) (index $cfg "extraRules") -}}
{{- $hasExtraRules := gt (len $extraRules) 0 -}}
{{- if or (index $cfg "workspacePerms") (index $cfg "enableDeployments") $hasExtraRules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "coder.rbacWorkspaceRoleName" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "coder.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "coder.rbacWorkspaceRoleName" $ }}
subjects:
  - kind: ServiceAccount
    name: {{ include "coder.serviceAccountName" $ | quote }}
    # The ServiceAccount always lives in the release namespace, even when additional workspace namespaces get their own RoleBinding.
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
