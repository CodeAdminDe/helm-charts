apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "envoy-gateway-instance-policies.fullname" . }}-test-render"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "envoy-gateway-instance-policies.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  automountServiceAccountToken: false
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: verify
      image: busybox:1.37
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      command: ["sh", "-c"]
      args:
        - |
          echo "envoy-gateway-instance-policies rendered successfully"
  restartPolicy: Never
