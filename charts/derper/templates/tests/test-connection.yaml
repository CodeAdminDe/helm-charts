apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "derper.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "derper.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  containers:
    - name: wget
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          wget --no-check-certificate -qO- https://{{ include "derper.fullname" . }}:{{ .Values.service.https.port }}/derp/probe
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
