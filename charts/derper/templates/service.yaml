apiVersion: v1
kind: Service
metadata:
  name: {{ include "derper.fullname" $ }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "derper.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if or (eq .Values.service.type "LoadBalancer") (eq .Values.service.type "NodePort") }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy | quote }}
  {{- end }}
  {{- with .Values.service.internalTrafficPolicy }}
  internalTrafficPolicy: {{ . | quote }}
  {{- end }}
  {{- if and (eq .Values.service.type "LoadBalancer") .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  {{- if eq .Values.service.type "LoadBalancer" }}
  allocateLoadBalancerNodePorts: {{ .Values.service.allocateLoadBalancerNodePorts }}
  {{- end }}
  {{- with .Values.service.externalIPs }}
  externalIPs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    {{- if .Values.service.http.enabled }}
    - name: http
      port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
    {{- end }}
    - name: https
      port: {{ .Values.service.https.port }}
      targetPort: https
      protocol: TCP
    {{- if .Values.stun.enabled }}
    - name: stun
      port: {{ .Values.stun.port }}
      targetPort: stun
      protocol: UDP
    {{- end }}
  selector:
    {{- include "derper.selectorLabels" . | nindent 4 }}
