{{- if ne .Values.service.type "ClusterIP" -}}
{{- fail "service.type must be ClusterIP in this repo style. Expose externally via ingress/route resources." -}}
{{- end -}}

{{- if and .Values.ingress.enabled (not .Values.ingress.hosts) -}}
{{- fail "ingress.enabled=true requires at least one ingress.hosts entry." -}}
{{- end -}}

{{- if .Values.gatewayApi.enabled -}}
  {{- if not .Values.gatewayApi.parentRefs -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.parentRefs entry." -}}
  {{- end -}}
  {{- if not .Values.gatewayApi.hostnames -}}
    {{- fail "gatewayApi.enabled=true requires at least one gatewayApi.hostnames entry." -}}
  {{- end -}}
{{- end -}}

{{- if gt (int .Values.replicaCount) 1 -}}
{{- fail "replicaCount must be <= 1 for this SonarQube Server chart." -}}
{{- end -}}

{{- if .Values.autoscaling.enabled -}}
{{- fail "autoscaling.enabled=true is not supported in this SonarQube Server chart (single-replica deployment model)." -}}
{{- end -}}

{{- if and .Values.rbac.create (not .Values.serviceAccount.create) (empty .Values.serviceAccount.name) -}}
{{- fail "rbac.create=true requires serviceAccount.create=true or a non-empty serviceAccount.name." -}}
{{- end -}}

{{- if and .Values.rbac.create (empty .Values.rbac.rules) -}}
{{- fail "rbac.create=true requires explicit rbac.rules; no broad default Role is generated by this chart." -}}
{{- end -}}

{{- if and .Values.libchartCnps.includeCnpgPolicies (not .Values.libchartCnps.enabled) -}}
{{- fail "libchartCnps.includeCnpgPolicies=true requires libchartCnps.enabled=true." -}}
{{- end -}}

{{- if and (not .Values.persistence.enabled) (not (empty .Values.persistence.existingClaim)) -}}
{{- fail "persistence.existingClaim requires persistence.enabled=true." -}}
{{- end -}}

{{- if and (not .Values.extensionsPersistence.enabled) (not (empty .Values.extensionsPersistence.existingClaim)) -}}
{{- fail "extensionsPersistence.existingClaim requires extensionsPersistence.enabled=true." -}}
{{- end -}}

{{- if and .Values.initContainers.plugins.enabled (empty .Values.initContainers.plugins.install) -}}
{{- fail "initContainers.plugins.enabled=true requires at least one initContainers.plugins.install URL." -}}
{{- end -}}

{{- if and .Values.sonarqube.monitoringPasscodeSecret.name (empty .Values.sonarqube.monitoringPasscodeSecret.key) -}}
{{- fail "sonarqube.monitoringPasscodeSecret.key must be set when sonarqube.monitoringPasscodeSecret.name is provided." -}}
{{- end -}}

{{- if .Values.database.useCnpgCluster.enabled -}}
  {{- if and (empty .Values.database.useCnpgCluster.clusterName) (empty .Values.database.useCnpgCluster.appConnectionSecretName) -}}
    {{- fail "database.useCnpgCluster.clusterName or database.useCnpgCluster.appConnectionSecretName must be set when CNPG integration is enabled." -}}
  {{- end -}}
{{- end -}}

{{- if not .Values.database.jdbcUrl -}}
  {{- if .Values.database.useCnpgCluster.enabled -}}
    {{- if empty .Values.database.useCnpgCluster.clusterName -}}
      {{- fail "database.useCnpgCluster.clusterName must be set when CNPG integration is enabled and database.jdbcUrl is empty." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.name -}}
      {{- fail "database.postgres.name must be set when CNPG integration is enabled and database.jdbcUrl is empty." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.username -}}
      {{- fail "database.useCnpgCluster.secretKeys.username is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.password -}}
      {{- fail "database.useCnpgCluster.secretKeys.password is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.sslMode -}}
      {{- fail "database.useCnpgCluster.sslMode must be set when CNPG integration is enabled and database.jdbcUrl is empty." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.database.postgres.host -}}
      {{- fail "database.postgres.host must be set when CNPG mode is disabled and database.jdbcUrl is empty." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.name -}}
      {{- fail "database.postgres.name must be set when CNPG mode is disabled and database.jdbcUrl is empty." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.user -}}
      {{- fail "database.postgres.user must be set when CNPG mode is disabled and database.jdbcUrl is empty." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.name -}}
      {{- fail "database.postgres.passwordSecret.name must be set when CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.key -}}
      {{- fail "database.postgres.passwordSecret.key must be set when CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.sslMode -}}
      {{- fail "database.postgres.sslMode must be set when CNPG mode is disabled and database.jdbcUrl is empty." -}}
    {{- end -}}
  {{- end -}}
{{- else -}}
  {{- if .Values.database.useCnpgCluster.enabled -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.username -}}
      {{- fail "database.useCnpgCluster.secretKeys.username is required when CNPG integration is enabled." -}}
    {{- end -}}
    {{- if empty .Values.database.useCnpgCluster.secretKeys.password -}}
      {{- fail "database.useCnpgCluster.secretKeys.password is required when CNPG integration is enabled." -}}
    {{- end -}}
  {{- else -}}
    {{- if empty .Values.database.postgres.user -}}
      {{- fail "database.postgres.user must be set when CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.name -}}
      {{- fail "database.postgres.passwordSecret.name must be set when CNPG mode is disabled." -}}
    {{- end -}}
    {{- if empty .Values.database.postgres.passwordSecret.key -}}
      {{- fail "database.postgres.passwordSecret.key must be set when CNPG mode is disabled." -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
