apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "actual-budget.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  containers:
    - name: wget
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          wget -qO- http://{{ include "actual-budget.fullname" . }}:{{ .Values.service.port }}/
  restartPolicy: Never
