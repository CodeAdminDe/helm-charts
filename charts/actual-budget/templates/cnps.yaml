{{- define "actual-budget.CiliumNetworkPolicies-NamespaceSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-NamespaceSet" (list . "actual-budget.CiliumNetworkPolicies-NamespaceSet") }}
---
{{- end -}}

{{- define "actual-budget.CiliumNetworkPolicies-CnpgSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
{{- end -}}

{{- if and .Values.libchartCnps.enabled .Values.libchartCnps.includeCnpgPolicies -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-CnpgSet" (list . "actual-budget.CiliumNetworkPolicies-CnpgSet") }}
---
{{- end -}}

{{- define "actual-budget.CiliumNetworkPolicies-AppSet" -}}
metadata:
  namespace: {{ .Release.Namespace }}
  annotations:
    checksum/values: {{ print .Values | sha256sum }}
  labels:
    {{- include "actual-budget.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "actual-budget.selectorLabels" . | nindent 6 }}
  {{- if .Values.cnps.appTraffic.ingress.allow }}
  ingress:
    - fromEndpoints:
        - matchLabels:
          {{- if .Values.cnps.appTraffic.ingress.matchLabels }}
          {{- range $k, $v := .Values.cnps.appTraffic.ingress.matchLabels }}
            {{ $k }}: {{ $v }}
          {{- end }}
          {{- else }}
            app.kubernetes.io/name: ingress-nginx
            io.kubernetes.pod.namespace: ingress-nginx
          {{- end }}
      toPorts:
        - ports:
            - port: {{ .Values.service.targetPort | quote }}
              protocol: {{ .Values.service.targetProtocol }}
  {{- end }}
  {{- if .Values.cnps.appTraffic.egress.allow }}
  egress:
    - toEntities:
      {{- if .Values.cnps.appTraffic.egress.toEntities }}
        {{- toYaml .Values.cnps.appTraffic.egress.toEntities | nindent 8 }}
      {{- else }}
        - world
      {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- end }}
{{- end -}}

{{- if .Values.libchartCnps.enabled -}}
{{ include "libchart-cnps.CiliumNetworkPolicies-AppSet" (list . "actual-budget.CiliumNetworkPolicies-AppSet") }}
{{- end -}}
