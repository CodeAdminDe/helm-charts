apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-kasm-ws-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kasm.defaultLabels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  {{- if .Values.runtimeClass.tests }}
  runtimeClassName: {{ .Values.runtimeClass.tests }}
  {{- end }}
  containers:
    - name: wget
      image: busybox:1.37
      command: ["sh", "-c"]
      args:
        - |
          wget -qO- http://kasm-api:8080/api/__healthcheck
  restartPolicy: Never
