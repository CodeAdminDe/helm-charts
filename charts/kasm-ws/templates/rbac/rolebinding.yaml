{{- if .Values.rbac.create }}
{{- $constants := (include "kasm.constants" . | fromYaml) -}}
{{- $defaultLabels := include "kasm.defaultLabels" . -}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kasm.rbacRoleName" . }}
  namespace: {{ include "kasm.rbacNamespace" . }}
  labels:
    app.kubernetes.io/name: {{ $constants.manager.name }}
    app.kubernetes.io/component: {{ $constants.manager.component }}
    {{- $defaultLabels | indent 4 }}
    {{- with .Values.labels }}{{- toYaml . | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kasm.rbacRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kasm.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
