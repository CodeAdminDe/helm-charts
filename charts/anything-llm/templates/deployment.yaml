{{- $postgresMode := eq (default "sqlite" .Values.database.mode) "postgres" -}}
{{- $cnpgMode := and $postgresMode .Values.database.useCnpgCluster.enabled -}}
{{- $secretName := include "anything-llm.secretName" . -}}
{{- $securityContext := deepCopy .Values.securityContext -}}
{{- if .Values.anythingllm.security.enableSysAdminCapability -}}
{{- $caps := default (dict) $securityContext.capabilities -}}
{{- $add := default (list) $caps.add -}}
{{- if not (has "SYS_ADMIN" $add) -}}
{{- $add = append $add "SYS_ADMIN" -}}
{{- end -}}
{{- $_ := set $caps "add" $add -}}
{{- $_ := set $securityContext "capabilities" $caps -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anything-llm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anything-llm.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "anything-llm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "anything-llm.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "anything-llm.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- if .Values.runtimeClass.pods }}
      runtimeClassName: {{ .Values.runtimeClass.pods }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "anything-llm.name" . }}
          image: {{ include "anything-llm.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: {{ .Values.service.targetProtocol }}
          env:
            - name: SERVER_PORT
              value: {{ printf "%v" .Values.service.targetPort | quote }}
            - name: STORAGE_DIR
              value: {{ .Values.anythingllm.storageDir | quote }}
            - name: NODE_ENV
              value: {{ .Values.anythingllm.nodeEnv | quote }}
            - name: DISABLE_TELEMETRY
              value: {{ ternary "true" "false" .Values.anythingllm.disableTelemetry | quote }}
            - name: WHISPER_PROVIDER
              value: {{ .Values.anythingllm.whisperProvider | quote }}
            - name: TTS_PROVIDER
              value: {{ .Values.anythingllm.ttsProvider | quote }}
            - name: DISABLE_SWAGGER_DOCS
              value: {{ ternary "true" "false" .Values.anythingllm.disableSwaggerDocs | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.secrets.keys.jwtSecret | quote }}
            - name: SIG_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.secrets.keys.sigKey | quote }}
            - name: SIG_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.secrets.keys.sigSalt | quote }}
            {{- if .Values.auth.enabled }}
            - name: AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ .Values.secrets.keys.authToken | quote }}
            {{- end }}
            {{- if .Values.anythingllm.collectorAllowAnyIp }}
            - name: COLLECTOR_ALLOW_ANY_IP
              value: "true"
            {{- end }}
            {{- if .Values.anythingllm.chromiumArgs }}
            - name: ANYTHINGLLM_CHROMIUM_ARGS
              value: {{ .Values.anythingllm.chromiumArgs | quote }}
            {{- end }}
            {{- if $postgresMode }}
            - name: VECTOR_DB
              value: "pgvector"
            {{- if $cnpgMode }}
            - name: DB_HOST
              value: {{ printf "%s-rw" .Values.database.useCnpgCluster.clusterName | quote }}
            - name: DB_PORT
              value: {{ printf "%v" .Values.database.useCnpgCluster.port | quote }}
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "anything-llm.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.database | quote }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "anything-llm.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "anything-llm.cnpg.appConnectionSecretName" . }}
                  key: {{ .Values.database.useCnpgCluster.secretKeys.password | quote }}
            {{- else }}
            - name: DB_HOST
              value: {{ .Values.database.postgres.host | quote }}
            - name: DB_PORT
              value: {{ printf "%v" .Values.database.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.postgres.database | quote }}
            - name: DB_USER
              value: {{ .Values.database.postgres.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.passwordSecret.name }}
                  key: {{ .Values.database.postgres.passwordSecret.key | quote }}
            {{- end }}
            - name: DB_SSL_MODE
              value: {{ .Values.database.postgres.ssl | quote }}
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=$(DB_SSL_MODE)"
            - name: PGVECTOR_CONNECTION_STRING
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=$(DB_SSL_MODE)"
            {{- if .Values.database.postgres.pgVectorTable }}
            - name: PGVECTOR_TABLE_NAME
              value: {{ .Values.database.postgres.pgVectorTable | quote }}
            {{- end }}
            {{- else }}
            - name: VECTOR_DB
              value: {{ .Values.anythingllm.vectorDb | quote }}
            {{- end }}
            {{- $extraEnvKeys := keys .Values.extraEnv | sortAlpha }}
            {{- range $key := $extraEnvKeys }}
            - name: {{ $key }}
              value: {{ index $.Values.extraEnv $key | quote }}
            {{- end }}
            {{- if kindIs "map" .Values.additionalEnvSecrets }}
            {{- range $envName, $secretConfig := .Values.additionalEnvSecrets }}
            {{- if kindIs "string" $secretConfig }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretConfig }}
                  key: {{ $envName | quote }}
            {{- else if kindIs "map" $secretConfig }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- if $secretName }}
            - name: {{ default $envName (index $secretConfig "name") }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- else if kindIs "slice" .Values.additionalEnvSecrets }}
            {{- range $secretConfig := .Values.additionalEnvSecrets }}
            {{- $envName := (default "" (index $secretConfig "name")) }}
            {{- $secretName := (default "" (index $secretConfig "secretName")) }}
            {{- if and $envName $secretName }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default $envName (index $secretConfig "secretKey") | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if or .Values.envFromSecrets .Values.envFromConfigMaps }}
          envFrom:
            {{- range .Values.envFromSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- range .Values.envFromConfigMaps }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml $securityContext | nindent 12 }}
          {{- if .Values.applyHealthChecks }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.tmpVolume.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpVolume.mountPath }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "anything-llm.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.tmpVolume.enabled }}
        - name: tmp
          emptyDir:
            {{- with .Values.tmpVolume.sizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
