{{- if .Values.secrets.create -}}
{{- $secretName := include "anything-llm.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $jwtKey := .Values.secrets.keys.jwtSecret -}}
{{- $sigKeyKey := .Values.secrets.keys.sigKey -}}
{{- $sigSaltKey := .Values.secrets.keys.sigSalt -}}
{{- $authTokenKey := .Values.secrets.keys.authToken -}}
{{- $jwtValue := randAlphaNum 48 -}}
{{- $sigKeyValue := randAlphaNum 64 -}}
{{- $sigSaltValue := randAlphaNum 64 -}}
{{- $authTokenValue := randAlphaNum 32 -}}
{{- if and $existing $existing.data -}}
  {{- if hasKey $existing.data $jwtKey -}}
    {{- $jwtValue = index $existing.data $jwtKey | b64dec -}}
  {{- end -}}
  {{- if hasKey $existing.data $sigKeyKey -}}
    {{- $sigKeyValue = index $existing.data $sigKeyKey | b64dec -}}
  {{- end -}}
  {{- if hasKey $existing.data $sigSaltKey -}}
    {{- $sigSaltValue = index $existing.data $sigSaltKey | b64dec -}}
  {{- end -}}
  {{- if and .Values.auth.enabled (hasKey $existing.data $authTokenKey) -}}
    {{- $authTokenValue = index $existing.data $authTokenKey | b64dec -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "anything-llm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $jwtKey }}: {{ $jwtValue | quote }}
  {{ $sigKeyKey }}: {{ $sigKeyValue | quote }}
  {{ $sigSaltKey }}: {{ $sigSaltValue | quote }}
  {{- if .Values.auth.enabled }}
  {{ $authTokenKey }}: {{ $authTokenValue | quote }}
  {{- end }}
{{- end }}
